<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>vidsrc player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Full bleed player — covers everything */
        .player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 0;
        }

        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* No extra UI — not even a status indicator */
    </style>
</head>
<body>

<div class="player">
    <iframe id="streamIframe" 
            title="vidsrc stream"
            allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation">
    </iframe>
</div>

<script>
    (function() {
        // ---------- get URL parameters ----------
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                id: params.get('id') ? params.get('id').trim() : null,
                type: params.get('type') ? params.get('type').toLowerCase() : null,
                season: params.get('s') || params.get('season'),
                episode: params.get('e') || params.get('episode'),
                api: params.get('api') || '1',
                color: params.get('color') ? params.get('color').trim().replace(/^#/, '') : null
            };
        }

        // validate hex color (3 or 6 hex digits, no #)
        function isValidHex(color) {
            return color && /^[0-9A-Fa-f]{3}$|^[0-9A-Fa-f]{6}$/.test(color);
        }

        // build vidsrc.wtf API url
        function buildStreamUrl(params) {
            const { id, type, season, episode, api, color } = params;
            
            if (!id) {
                throw new Error('Missing required parameter: "id" (TMDB or IMDB ID)');
            }
            
            const mediaType = type === 'tv' ? 'tv' : 'movie';
            const encodedId = encodeURIComponent(id);
            const colorParam = (color && isValidHex(color)) ? `&color=${color}` : '';
            const baseApi = `https://vidsrc.wtf/api/${api}`;
            
            if (mediaType === 'movie') {
                return `${baseApi}/movie/?id=${encodedId}${colorParam}`;
            } else {
                let sNum = season ? parseInt(season, 10) : 1;
                let eNum = episode ? parseInt(episode, 10) : 1;
                if (isNaN(sNum)) sNum = 1;
                if (isNaN(eNum)) eNum = 1;
                return `${baseApi}/tv/?id=${encodedId}&s=${sNum}&e=${eNum}${colorParam}`;
            }
        }

        const iframe = document.getElementById('streamIframe');
        
        // load stream into iframe
        function loadStream() {
            try {
                const params = getQueryParams();
                const url = buildStreamUrl(params);
                iframe.src = url;
                // optional: silent console log for debugging (no UI)
                console.log(`[vidsrc] ${url}`);
            } catch (err) {
                console.error(err);
                // Show user-friendly error inside iframe so the player remains fullscreen
                const errorMessage = `
                    <div style="display:flex; align-items:center; justify-content:center; height:100%; background:#0a0c10; color:#e2e8f0; font-family:system-ui, -apple-system, sans-serif; text-align:center; padding:1rem;">
                        <div>
                            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto; color:#ef4444;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                            <h2 style="margin-top:1rem; font-weight:500;">Missing media ID</h2>
                            <p style="margin-top:0.5rem; font-size:0.9rem; opacity:0.7;">Use <code style="background:#1e1f28; padding:0.2rem 0.5rem; border-radius:8px;">?id=597&type=movie</code><br/>
                            or <code style="background:#1e1f28; padding:0.2rem 0.5rem; border-radius:8px;">?id=1399&type=tv&s=1&e=1</code></p>
                            <p style="margin-top:1rem; font-size:0.75rem;">✅ Supports TMDB / IMDB IDs, API (1-4) & color</p>
                        </div>
                    </div>
                `;
                iframe.srcdoc = errorMessage;
            }
        }

        // ----- WATCH PROGRESS TRACKING (silent, localStorage) -----
        // Stores data exactly as vidsrc.wtf sends it (for "Continue Watching")
        const STORAGE_KEY = "vidsrcwtf-Progress";
        
        function mergeMediaData(mediaData) {
            if (!mediaData || !mediaData.id) return;
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                let stored = raw ? JSON.parse(raw) : {};
                const id = String(mediaData.id);
                const now = Date.now();
                let entry = stored[id] || {};
                entry.id = id;
                entry.type = mediaData.type || entry.type || 'movie';
                if (mediaData.title) entry.title = mediaData.title;
                if (mediaData.poster_path) entry.poster_path = mediaData.poster_path;
                if (mediaData.backdrop_path) entry.backdrop_path = mediaData.backdrop_path;
                
                if (mediaData.progress && typeof mediaData.progress.watched === 'number') {
                    entry.progress = {
                        watched: mediaData.progress.watched,
                        duration: mediaData.progress.duration || entry.progress?.duration || 0
                    };
                } else if (mediaData.progress) {
                    entry.progress = { ...(entry.progress || {}), ...mediaData.progress };
                }
                entry.last_updated = now;
                
                // TV show specific metadata
                if (entry.type === 'tv') {
                    if (mediaData.number_of_seasons) entry.number_of_seasons = mediaData.number_of_seasons;
                    if (mediaData.number_of_episodes) entry.number_of_episodes = mediaData.number_of_episodes;
                    if (mediaData.season) entry.last_season_watched = String(mediaData.season);
                    if (mediaData.episode) entry.last_episode_watched = String(mediaData.episode);
                    
                    if (mediaData.season && mediaData.episode && mediaData.progress) {
                        if (!entry.show_progress) entry.show_progress = {};
                        const epKey = `s${mediaData.season}e${mediaData.episode}`;
                        entry.show_progress[epKey] = {
                            season: String(mediaData.season),
                            episode: String(mediaData.episode),
                            progress: {
                                watched: mediaData.progress.watched || 0,
                                duration: mediaData.progress.duration || 0
                            },
                            last_updated: now
                        };
                    }
                } else {
                    delete entry.last_season_watched;
                    delete entry.last_episode_watched;
                    delete entry.show_progress;
                    delete entry.number_of_episodes;
                    delete entry.number_of_seasons;
                }
                
                stored[id] = entry;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
                // silent debug (optional, can be removed)
                // console.debug(`[progress] saved ${mediaData.title || id}`);
            } catch(e) {
                // ignore storage errors (privacy mode, etc.)
            }
        }
        
        // listen for MEDIA_DATA messages from vidsrc.wtf iframe
        window.addEventListener("message", (event) => {
            if (event.origin !== "https://www.vidsrc.wtf") return;
            if (event.data?.type === "MEDIA_DATA") {
                const mediaData = event.data.data;
                if (mediaData && mediaData.id) {
                    mergeMediaData(mediaData);
                }
            }
        });
        
        // initial load
        loadStream();
        
        // listen for URL changes (history push/replace) to reload player dynamically
        const originalPushState = history.pushState;
        const originalReplaceState = history.replaceState;
        history.pushState = function() {
            originalPushState.apply(this, arguments);
            loadStream();
        };
        history.replaceState = function() {
            originalReplaceState.apply(this, arguments);
            loadStream();
        };
        
        window.addEventListener('popstate', () => loadStream());
    })();
</script>
</body>
</html>
