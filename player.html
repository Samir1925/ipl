<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StreamHub Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .player-container {
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: white;
            gap: 16px;
            background: #0a0a0f;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="player-container" id="playerContainer">
        <div class="loader">
            <div class="spinner"></div>
            <div>Loading stream from vidsrc.wtf...</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const id = params.get('id');
        const season = params.get('season');
        const episode = params.get('episode');
        const apiVersion = params.get('api'); // 2 or 4

        if (!type || !id) {
            document.getElementById('playerContainer').innerHTML = '<div class="loader" style="color:#f87171;">❌ Missing type or id parameter</div>';
        } else {
            loadVideo();
        }

        async function loadVideo() {
            const container = document.getElementById('playerContainer');
            try {
                const version = apiVersion === '4' ? 4 : 2;
                const hexColor = "e50914";
                let apiUrl;
                if (type === 'movie') {
                    apiUrl = `https://vidsrc.wtf/api/${version}/movie/?id=${id}&color=${hexColor}`;
                } else {
                    const s = season || 1;
                    const e = episode || 1;
                    apiUrl = `https://vidsrc.wtf/api/${version}/tv/?id=${id}&s=${s}&e=${e}&color=${hexColor}`;
                }

                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`API ${version} returned ${response.status}`);
                const data = await response.json();

                let embedUrl = null;
                if (data.iframe) embedUrl = data.iframe;
                else if (data.url) embedUrl = data.url;
                else if (data.result && data.result.url) embedUrl = data.result.url;
                else if (typeof data === "string" && data.startsWith("http")) embedUrl = data;
                else throw new Error("Could not extract video source from API response");

                if (!embedUrl.startsWith("http")) embedUrl = "https:" + embedUrl;

                const iframe = document.createElement('iframe');
                iframe.src = embedUrl;
                iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen";
                iframe.allowFullscreen = true;
                container.innerHTML = '';
                container.appendChild(iframe);

                // Watch progress listener
                window.addEventListener("message", (event) => {
                    if (event.origin !== "https://www.vidsrc.wtf") return;
                    if (event.data?.type === "MEDIA_DATA") {
                        localStorage.setItem("vidsrcwtf-Progress", JSON.stringify(event.data.data));
                        console.log("Progress saved", event.data.data);
                    }
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="loader" style="color:#f87171;">⚠️ Failed to load: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
