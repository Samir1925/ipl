<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>StreamHub — Watch Anywhere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ---------- ROOT VARIABLES ---------- */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent: #e50914;
            --accent-hover: #ff1a25;
            --accent-glow: rgba(229, 9, 20, 0.35);
            --text-primary: #ffffff;
            --text-secondary: #b0b0bb;
            --text-muted: #6b6b7b;
            --card-radius: 12px;
            --transition-fast: 0.2s;
            --transition-smooth: 0.35s;
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);
            --bottom-nav-bg: rgba(10, 10, 15, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a, a:hover, a:focus, button, .clickable {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* ---------- TOP NAVBAR ---------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.2s;
            background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 60%, transparent 100%);
            backdrop-filter: blur(20px);
        }
        .navbar.scrolled {
            background: rgba(10,10,15,0.95);
            padding: 10px 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo {
            font-size: 24px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .logo-icon { font-size: 26px; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .logo-text {
            background: linear-gradient(135deg, #e50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links { display: none; list-style: none; gap: 24px; }
        @media (min-width: 768px) { .nav-links { display: flex; } }
        .nav-links li {
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .nav-links li:hover, .nav-links li.active { color: white; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-icon {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
        }
        .search-container { position: relative; }
        .search-input-wrap {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            overflow: hidden;
            transition: width 0.35s;
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
        }
        .search-input-wrap.active { width: 220px; padding: 0 14px; }
        .search-input-wrap input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
            padding: 10px 0;
        }
        .close-search { color: white; cursor: pointer; margin-left: 8px; }

        /* ---------- BOTTOM NAVIGATION (mobile only) ---------- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bottom-nav-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px 12px;
            z-index: 1000;
        }
        @media (min-width: 768px) { .bottom-nav { display: none; } }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
        }
        .bottom-nav-item i { font-size: 22px; }
        .bottom-nav-item span { font-size: 11px; font-weight: 500; }
        .bottom-nav-item.active {
            color: var(--accent);
            background: rgba(229, 9, 20, 0.12);
        }

        /* ---------- HERO BANNER ---------- */
        .hero {
            height: 85vh;
            min-height: 450px;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            padding: 40px 24px 60px;
            position: relative;
            transition: opacity 0.4s;
        }
        .hero.hidden-hero {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            height: 0;
            padding: 0;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-primary) 0%, rgba(10,10,15,0.8) 30%, rgba(0,0,0,0.4) 70%, transparent 100%);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 620px;
        }
        .hero-badge {
            display: inline-flex;
            background: var(--accent);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .hero h1 { font-size: clamp(28px, 6vw, 50px); font-weight: 900; margin-bottom: 8px; }
        .hero-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
        .hero-rating { color: #ffc107; }
        .hero-year { color: var(--text-secondary); font-size: 12px; }
        .hero p { color: #c8c8d4; font-size: 14px; line-height: 1.5; margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .btn-play { background: var(--accent); color: white; }
        .btn-info { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); }

        /* Rows & Carousels */
        .main-content { position: relative; z-index: 4; margin-top: -40px; padding-bottom: 80px; }
        .hero.hidden-hero + .main-content { margin-top: 20px; }
        .row { margin: 8px 0 24px; padding: 0 16px; }
        @media (min-width: 768px) { .row { padding: 0 48px; } }
        .row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row h2 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .row h2::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }
        .row-explore { font-size: 12px; color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .row-container-wrapper { position: relative; }
        .row-container { display: flex; overflow-x: auto; gap: 12px; padding: 8px 4px 16px; scroll-snap-type: x proximity; }
        .scroll-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 32px; height: 32px; background: rgba(10,10,15,0.85); backdrop-filter: blur(12px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.2s;
        }
        .row-container-wrapper:hover .scroll-arrow { opacity: 1; }
        .scroll-arrow.left { left: 0; }
        .scroll-arrow.right { right: 0; }

        /* Card */
        .card {
            min-width: 120px; width: 120px; aspect-ratio: 2 / 3;
            background-size: cover; background-position: center;
            border-radius: var(--card-radius); cursor: pointer;
            position: relative; overflow: hidden; transition: transform 0.2s;
            flex-shrink: 0;
        }
        @media (min-width: 480px) { .card { min-width: 150px; } }
        @media (min-width: 768px) { .card { min-width: 170px; } }
        .card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 40%, transparent 65%);
        }
        .card:hover { transform: scale(1.05); z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 10px; }
        .card-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { display: flex; gap: 6px; font-size: 10px; color: #c8c8d4; opacity: 0; transition: 0.2s; }
        .card:hover .card-meta { opacity: 1; }
        .card-rating { color: #ffc107; }
        .card-play-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            width: 40px; height: 40px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; pointer-events: none;
        }
        .card:hover .card-play-overlay { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* Grid views (explore, search, categories) */
        .grid-container { padding: 0 16px; margin-top: 16px; }
        @media (min-width: 768px) { .grid-container { padding: 0 48px; } }
        .grid-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .grid-header h2 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .grid-header h2::before { content: ''; width: 4px; height: 22px; background: var(--accent); border-radius: 3px; }
        .back-home-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; color: var(--text-secondary); }
        .search-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        @media (min-width: 480px) { .search-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
        @media (min-width: 768px) { .search-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; } }
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
            padding: 0 16px;
        }
        .skeleton-grid-item {
            aspect-ratio: 2 / 3;
            background: linear-gradient(135deg, #1a1a25 25%, #222230 50%, #1a1a25 75%);
            background-size: 200% 200%;
            animation: shimmer 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,30,0.95); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 40px; font-size: 13px;
            z-index: 9999; border: 1px solid rgba(255,255,255,0.15);
            animation: fadeIn 0.3s forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (min-width: 768px) {
            .hero { padding: 60px 48px 80px; min-height: 550px; }
            .hero h1 { font-size: 48px; }
            .toast { bottom: 30px; }
        }
    </style>
</head>
<body>

<!-- TOP NAVBAR -->
<nav class="navbar" id="navbar">
    <div class="nav-left">
        <div class="logo" onclick="resetToHome()">
            <span class="logo-icon"><i class="fa-solid fa-play"></i></span>
            <span class="logo-text">STREAMHUB</span>
        </div>
        <ul class="nav-links">
            <li class="active" data-nav="home">Home</li>
            <li data-nav="movies">Movies</li>
            <li data-nav="series">Series</li>
            <li data-nav="popular">New & Popular</li>
            <li data-nav="mylist">My List</li>
        </ul>
    </div>
    <div class="nav-right">
        <div class="search-container">
            <button class="nav-icon" id="searchToggle"><i class="fa-solid fa-magnifying-glass"></i></button>
            <div class="search-input-wrap" id="searchWrap">
                <input type="text" id="searchInput" placeholder="Titles, people, genres" autocomplete="off">
                <span class="close-search" id="closeSearchBtn"><i class="fa-solid fa-xmark"></i></span>
            </div>
        </div>
    </div>
</nav>

<!-- BOTTOM NAVIGATION (mobile only) -->
<div class="bottom-nav" id="bottomNav">
    <div class="bottom-nav-item active" data-nav="home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
    </div>
    <div class="bottom-nav-item" data-nav="movies">
        <i class="fa-solid fa-film"></i>
        <span>Movies</span>
    </div>
    <div class="bottom-nav-item" data-nav="series">
        <i class="fa-solid fa-tv"></i>
        <span>Series</span>
    </div>
    <div class="bottom-nav-item" data-nav="popular">
        <i class="fa-solid fa-fire"></i>
        <span>Popular</span>
    </div>
    <div class="bottom-nav-item" data-nav="mylist">
        <i class="fa-solid fa-list"></i>
        <span>My List</span>
    </div>
</div>

<!-- HERO BANNER -->
<div id="hero" class="hero skeleton-hero">
    <div class="hero-content" id="heroContent" style="opacity:0;">
        <div class="hero-badge"><i class="fa-solid fa-fire"></i> #1 Trending Today</div>
        <h1 id="heroTitle"></h1>
        <div class="hero-meta">
            <span class="hero-rating"><i class="fa-solid fa-star"></i> <span id="heroRating">—</span></span>
            <span class="hero-year" id="heroYear">—</span>
        </div>
        <p id="heroDesc"></p>
        <div class="hero-buttons">
            <button class="btn btn-play" onclick="playHero()"><i class="fa-solid fa-play"></i> Watch Now</button>
            <button class="btn btn-info" onclick="goToMovie()"><i class="fa-solid fa-circle-info"></i> More Info</button>
        </div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div id="rows"></div>
</div>

<script>
    // ---------- CONFIG ----------
    const API_KEY = "e7f6bfe957eaa0d78540e0f5cecbb90b";
    const TMDB_BASE = "https://api.themoviedb.org/3";

    let heroMovie = null;
    let trendingData = [];
    let popularData = [];
    let topRatedData = [];
    let searchActive = false;
    let exploreMode = false;
    let searchTimer = null;
    let abortController = null;

    // ---------- FALLBACK MOVIES (never empty) ----------
    const FALLBACK_MOVIES = [
        { id: 550, title: "Fight Club", poster_path: "/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg", vote_average: 8.4, release_date: "1999-10-15", overview: "An insomniac office worker and a devil-may-care soap maker form an underground fight club." },
        { id: 278, title: "The Shawshank Redemption", poster_path: "/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg", vote_average: 8.7, release_date: "1994-09-23" },
        { id: 238, title: "The Godfather", poster_path: "/3bhkrj58Vtu7enYsRolD1fZdja1.jpg", vote_average: 8.7, release_date: "1972-03-14" },
        { id: 155, title: "The Dark Knight", poster_path: "/qJ2tW6WMUDux911r6m7haRef0WH.jpg", vote_average: 8.5, release_date: "2008-07-16" },
        { id: 13, title: "Forrest Gump", poster_path: "/arw2vcBveWOVZr6pxd9YnOSGMtV.jpg", vote_average: 8.5, release_date: "1994-06-23" },
        { id: 122, title: "The Lord of the Rings: The Return of the King", poster_path: "/rCzpDGLbOoPwLjy3OAm5NUPOTrC.jpg", vote_average: 8.6, release_date: "2003-12-01" }
    ];

    const FALLBACK_TV = [
        { id: 1399, name: "Game of Thrones", poster_path: "/7WUHnWGx5OO145IRxPDUkQSh4C7.jpg", vote_average: 8.4, first_air_date: "2011-04-17" },
        { id: 1396, name: "Breaking Bad", poster_path: "/ggFHVNu6YYI5L9pCfOacjizRGt.jpg", vote_average: 8.9, first_air_date: "2008-01-20" },
    ];

    // Helper functions
    async function fetchJson(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (err) {
            console.warn("Fetch failed:", url, err);
            return null;
        }
    }

    async function fetchMovies(url) {
        const data = await fetchJson(url);
        return data?.results || [];
    }

    function getImageUrl(path, size = "w500") {
        return path ? `https://image.tmdb.org/t/p/${size}${path}` : "";
    }

    function formatRating(vote) {
        if (!vote && vote !== 0) return "—";
        return (vote / 2).toFixed(1);
    }

    function formatYear(dateStr) {
        return dateStr ? dateStr.substring(0, 4) : "—";
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Create card element (supports both movies and TV)
    function createCard(item) {
        const card = document.createElement("div");
        card.className = "card";
        const title = item.title || item.name || "Untitled";
        const poster = getImageUrl(item.poster_path);
        card.style.backgroundImage = poster ? `url(${poster})` : "linear-gradient(135deg, #1e1e2c, #2a2a3a)";
        card.innerHTML = `
            <div class="card-play-overlay"><i class="fa-solid fa-play"></i></div>
            <div class="card-info">
                <div class="card-title">${escapeHtml(title)}</div>
                <div class="card-meta">
                    <span class="card-rating"><i class="fa-solid fa-star"></i> ${formatRating(item.vote_average)}</span>
                    <span class="card-year">${formatYear(item.release_date || item.first_air_date)}</span>
                </div>
            </div>
        `;
        // Determine if it's a movie or TV show
        const isMovie = !!item.title;
        card.addEventListener("click", () => {
            const type = isMovie ? "movie" : "tv";
            window.location.href = `watch.html?type=${type}&id=${item.id}`;
        });
        return card;
    }

    // Create carousel row
    function createCarouselRow(title, items, rowId = null) {
        if (!items || items.length === 0) return;
        const rowDiv = document.createElement("div");
        rowDiv.className = "row";
        if (rowId) rowDiv.id = rowId;
        rowDiv.innerHTML = `
            <div class="row-header">
                <h2>${escapeHtml(title)}</h2>
                <span class="row-explore" data-category="${rowId || title}">Explore All <i class="fa-solid fa-chevron-right"></i></span>
            </div>
            <div class="row-container-wrapper">
                <div class="scroll-arrow left"><i class="fa-solid fa-chevron-left"></i></div>
                <div class="row-container"></div>
                <div class="scroll-arrow right"><i class="fa-solid fa-chevron-right"></i></div>
            </div>
        `;
        const container = rowDiv.querySelector(".row-container");
        items.forEach(item => {
            if (item.poster_path) container.appendChild(createCard(item));
        });
        const leftArrow = rowDiv.querySelector(".scroll-arrow.left");
        const rightArrow = rowDiv.querySelector(".scroll-arrow.right");
        leftArrow.addEventListener("click", () => container.scrollBy({ left: -350, behavior: "smooth" }));
        rightArrow.addEventListener("click", () => container.scrollBy({ left: 350, behavior: "smooth" }));
        
        const exploreBtn = rowDiv.querySelector(".row-explore");
        exploreBtn.addEventListener("click", () => {
            let category = "";
            if (rowId === "row-trending") category = "trending";
            else if (rowId === "row-popular") category = "popular";
            else if (rowId === "row-top-rated") category = "top_rated";
            if (category) showExploreGrid(title, category);
            else showToast(`🔍 Exploring ${title}`);
        });
        document.getElementById("rows").appendChild(rowDiv);
    }

    // Build default rows from data (with fallback)
    function buildDefaultRows() {
        const rowsContainer = document.getElementById("rows");
        rowsContainer.innerHTML = "";
        const trending = trendingData.length ? trendingData : FALLBACK_MOVIES;
        const popular = popularData.length ? popularData : FALLBACK_MOVIES.slice(0,6);
        const topRated = topRatedData.length ? topRatedData : FALLBACK_MOVIES.slice(0,6);
        createCarouselRow("🔥 Trending Now", trending, "row-trending");
        createCarouselRow("🎬 Popular", popular, "row-popular");
        createCarouselRow("⭐ Top Rated", topRated, "row-top-rated");
        exploreMode = false;
        searchActive = false;
        setHeroVisibility(true);
    }

    // Hero functions
    function setHero(movie) {
        heroMovie = movie;
        const heroEl = document.getElementById("hero");
        const heroContent = document.getElementById("heroContent");
        const backdrop = getImageUrl(movie.backdrop_path, "original") || getImageUrl(movie.poster_path, "original");
        const img = new Image();
        img.onload = () => {
            heroEl.style.backgroundImage = `url(${backdrop})`;
            heroEl.classList.remove("skeleton-hero");
            heroContent.style.opacity = "1";
        };
        img.onerror = () => {
            heroEl.style.backgroundImage = `url(${getImageUrl(movie.poster_path, "original")})`;
            heroEl.classList.remove("skeleton-hero");
            heroContent.style.opacity = "1";
        };
        img.src = backdrop;
        document.getElementById("heroTitle").innerText = movie.title || movie.name || "Untitled";
        document.getElementById("heroDesc").innerText = movie.overview || "No description available.";
        document.getElementById("heroRating").innerHTML = formatRating(movie.vote_average);
        document.getElementById("heroYear").innerText = formatYear(movie.release_date || movie.first_air_date);
    }

    function setHeroVisibility(visible) {
        const heroEl = document.getElementById("hero");
        if (visible) heroEl.classList.remove("hidden-hero");
        else heroEl.classList.add("hidden-hero");
    }

    function goToMovie() {
        if (heroMovie) window.location.href = `watch.html?type=movie&id=${heroMovie.id}`;
    }
    function playHero() {
        if (heroMovie) {
            showToast(`🎬 Opening player for "${heroMovie.title || heroMovie.name}"`);
            setTimeout(() => goToMovie(), 600);
        }
    }

    // Explore All (grid)
    async function showExploreGrid(title, category) {
        const rowsContainer = document.getElementById("rows");
        rowsContainer.innerHTML = `
            <div class="grid-container">
                <div class="grid-header">
                    <h2>${escapeHtml(title)}</h2>
                    <button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
                </div>
                <div class="skeleton-grid" id="skeletonGrid">
                    ${'<div class="skeleton-grid-item"></div>'.repeat(12)}
                </div>
            </div>
        `;
        document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        setHeroVisibility(false);
        
        let items = [];
        try {
            let url = "";
            if (category === "trending") url = `${TMDB_BASE}/trending/movie/week?api_key=${API_KEY}`;
            else if (category === "popular") url = `${TMDB_BASE}/movie/popular?api_key=${API_KEY}`;
            else if (category === "top_rated") url = `${TMDB_BASE}/movie/top_rated?api_key=${API_KEY}`;
            if (url) {
                const data = await fetchJson(url);
                items = data?.results || [];
            }
            if (!items.length) items = FALLBACK_MOVIES;
            renderGrid(title, items, true);
        } catch (err) {
            console.error(err);
            renderGrid(title, FALLBACK_MOVIES, true);
        }
    }

    function renderGrid(title, items, showBackButton = true) {
        const rowsContainer = document.getElementById("rows");
        rowsContainer.innerHTML = "";
        const containerDiv = document.createElement("div");
        containerDiv.className = "grid-container";
        containerDiv.innerHTML = `
            <div class="grid-header">
                <h2>${escapeHtml(title)} (${items.length})</h2>
                ${showBackButton ? '<button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>' : ''}
            </div>
            <div class="search-grid" id="searchGrid"></div>
        `;
        const grid = containerDiv.querySelector("#searchGrid");
        items.forEach(item => {
            if (item.poster_path) grid.appendChild(createCard(item));
        });
        rowsContainer.appendChild(containerDiv);
        if (showBackButton) document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        exploreMode = true;
        searchActive = false;
        setHeroVisibility(false);
    }

    // ---------- NEW: Category-based loading (Movies, Series, Popular, MyList) ----------
    async function loadCategory(category) {
        // Close search if open
        const wrap = document.getElementById("searchWrap");
        if (wrap.classList.contains("active")) {
            document.getElementById("searchInput").value = "";
            wrap.classList.remove("active");
            document.getElementById("searchToggle").style.display = "flex";
            document.getElementById("searchToggle").style.opacity = "1";
        }
        
        if (category === "home") {
            resetToHome();
            return;
        }
        
        setHeroVisibility(false);
        const rowsContainer = document.getElementById("rows");
        rowsContainer.innerHTML = `
            <div class="grid-container">
                <div class="grid-header">
                    <h2>Loading ${category}...</h2>
                    <button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
                </div>
                <div class="skeleton-grid" id="skeletonGrid">${'<div class="skeleton-grid-item"></div>'.repeat(12)}</div>
            </div>
        `;
        document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        
        let items = [];
        let title = "";
        try {
            if (category === "movies") {
                title = "Popular Movies";
                const data = await fetchJson(`${TMDB_BASE}/movie/popular?api_key=${API_KEY}`);
                items = data?.results || [];
                if (!items.length) items = FALLBACK_MOVIES;
            } 
            else if (category === "series") {
                title = "Popular TV Series";
                const data = await fetchJson(`${TMDB_BASE}/tv/popular?api_key=${API_KEY}`);
                items = data?.results || [];
                if (!items.length) items = FALLBACK_TV;
            }
            else if (category === "popular") {
                title = "Trending Now";
                const data = await fetchJson(`${TMDB_BASE}/trending/movie/week?api_key=${API_KEY}`);
                items = data?.results || [];
                if (!items.length) items = FALLBACK_MOVIES;
            }
            else if (category === "mylist") {
                // My List: could be from localStorage; for now show placeholder
                title = "My Watchlist";
                const saved = localStorage.getItem("vidsrcwtf-Progress");
                if (saved) {
                    // Show a simple message - actual implementation would need stored IDs
                    items = [];
                    rowsContainer.innerHTML = `
                        <div class="grid-container">
                            <div class="grid-header">
                                <h2>📋 My List</h2>
                                <button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
                            </div>
                            <div style="text-align:center; padding:60px 20px; color:#b0b0bb;">
                                <i class="fa-solid fa-clock" style="font-size:48px; margin-bottom:16px;"></i>
                                <p>Your watchlist is empty. Start watching movies to see them here!</p>
                            </div>
                        </div>
                    `;
                    document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
                    exploreMode = true;
                    return;
                } else {
                    rowsContainer.innerHTML = `
                        <div class="grid-container">
                            <div class="grid-header">
                                <h2>📋 My List</h2>
                                <button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
                            </div>
                            <div style="text-align:center; padding:60px 20px; color:#b0b0bb;">
                                <i class="fa-solid fa-star" style="font-size:48px; margin-bottom:16px;"></i>
                                <p>Your list is empty. Add movies by watching them (progress will be saved).</p>
                            </div>
                        </div>
                    `;
                    document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
                    exploreMode = true;
                    return;
                }
            }
            
            if (items.length) {
                renderGrid(title, items, true);
                exploreMode = true;
            } else {
                throw new Error("No items found");
            }
        } catch (err) {
            console.error(err);
            rowsContainer.innerHTML = `<div class="grid-container"><div class="grid-header"><h2>⚠️ Failed to load ${category}</h2><button class="back-home-btn" id="backToHomeBtn">Back to Home</button></div></div>`;
            document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        }
    }

    // Search
    async function searchTMDB(query) {
        if (!query.trim()) {
            if (searchActive || exploreMode) resetToHome();
            return;
        }
        if (abortController) abortController.abort();
        abortController = new AbortController();
        const rowsContainer = document.getElementById("rows");
        rowsContainer.innerHTML = `
            <div class="grid-container">
                <div class="grid-header">
                    <h2>🔎 Searching "${escapeHtml(query)}"</h2>
                    <button class="back-home-btn" id="backToHomeBtn"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
                </div>
                <div class="skeleton-grid" id="skeletonGrid">${'<div class="skeleton-grid-item"></div>'.repeat(12)}</div>
            </div>
        `;
        document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        setHeroVisibility(false);
        
        try {
            const url = `${TMDB_BASE}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}&page=1`;
            const res = await fetch(url, { signal: abortController.signal });
            const data = await res.json();
            let results = data.results.filter(item => (item.media_type === 'movie' || item.media_type === 'tv') && item.poster_path);
            results = results.slice(0, 30);
            if (results.length === 0) {
                rowsContainer.innerHTML = `<div class="grid-container"><div class="grid-header"><h2>😔 No results for "${escapeHtml(query)}"</h2><button class="back-home-btn" id="backToHomeBtn">Back to Home</button></div></div>`;
                document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
                searchActive = true;
            } else {
                renderGrid(`Search results for "${query}"`, results, true);
                searchActive = true;
            }
        } catch (err) {
            if (err.name === 'AbortError') return;
            rowsContainer.innerHTML = `<div class="grid-container"><div class="grid-header"><h2>⚠️ Search error</h2><button class="back-home-btn" id="backToHomeBtn">Back to Home</button></div></div>`;
            document.getElementById("backToHomeBtn").addEventListener("click", resetToHome);
        }
    }

    function debouncedSearch(query) {
        if (searchTimer) clearTimeout(searchTimer);
        searchTimer = setTimeout(() => searchTMDB(query), 400);
    }

    function handleSearchInput() {
        const query = document.getElementById("searchInput").value;
        if (query.length === 0) {
            if (searchActive || exploreMode) resetToHome();
            return;
        }
        debouncedSearch(query);
    }

    // Reset home
    function resetToHome() {
        window.scrollTo({ top: 0, behavior: "smooth" });
        buildDefaultRows();
        const wrap = document.getElementById("searchWrap");
        if (wrap.classList.contains("active")) {
            document.getElementById("searchInput").value = "";
            wrap.classList.remove("active");
            document.getElementById("searchToggle").style.display = "flex";
            document.getElementById("searchToggle").style.opacity = "1";
        }
        searchActive = false;
        exploreMode = false;
        setHeroVisibility(true);
        updateActiveNav("home");
    }

    // Navigation helpers
    function updateActiveNav(activeId) {
        document.querySelectorAll(".nav-links li, .bottom-nav-item").forEach(el => {
            if (el.getAttribute("data-nav") === activeId) {
                el.classList.add("active");
            } else {
                el.classList.remove("active");
            }
        });
    }

    function handleNavClick(navId) {
        updateActiveNav(navId);
        loadCategory(navId);
    }

    // UI interactions
    function openSearch() {
        const wrap = document.getElementById("searchWrap");
        const input = document.getElementById("searchInput");
        const toggleBtn = document.getElementById("searchToggle");
        if (!wrap.classList.contains("active")) {
            wrap.classList.add("active");
            input.focus();
            toggleBtn.style.opacity = "0";
            setTimeout(() => (toggleBtn.style.display = "none"), 200);
        }
    }

    function closeSearchAndReset() {
        const wrap = document.getElementById("searchWrap");
        const input = document.getElementById("searchInput");
        const toggleBtn = document.getElementById("searchToggle");
        if (wrap.classList.contains("active")) {
            wrap.classList.remove("active");
            input.value = "";
            if (searchActive || exploreMode) resetToHome();
            toggleBtn.style.display = "flex";
            toggleBtn.style.opacity = "1";
            if (searchTimer) clearTimeout(searchTimer);
            if (abortController) abortController.abort();
        } else {
            if (searchActive || exploreMode) resetToHome();
            else setHeroVisibility(true);
        }
    }

    // Scroll effect on navbar
    window.addEventListener("scroll", () => {
        const navbar = document.getElementById("navbar");
        if (window.scrollY > 50) navbar.classList.add("scrolled");
        else navbar.classList.remove("scrolled");
    });

    // Attach event listeners
    document.getElementById("searchToggle").addEventListener("click", (e) => { e.stopPropagation(); openSearch(); });
    document.getElementById("closeSearchBtn").addEventListener("click", (e) => { e.stopPropagation(); closeSearchAndReset(); });
    document.getElementById("searchInput").addEventListener("input", handleSearchInput);
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchTMDB(e.target.value);
        else if (e.key === "Escape") closeSearchAndReset();
    });
    
    // Desktop nav links
    document.querySelectorAll(".nav-links li").forEach(li => {
        li.addEventListener("click", () => {
            const navId = li.getAttribute("data-nav");
            handleNavClick(navId);
        });
    });
    
    // Bottom nav items
    document.querySelectorAll(".bottom-nav-item").forEach(item => {
        item.addEventListener("click", () => {
            const navId = item.getAttribute("data-nav");
            handleNavClick(navId);
        });
    });
    
    document.querySelector(".logo")?.addEventListener("click", resetToHome);
    document.addEventListener("click", (e) => {
        const wrap = document.getElementById("searchWrap");
        const container = document.querySelector(".search-container");
        if (wrap.classList.contains("active") && container && !container.contains(e.target)) closeSearchAndReset();
    });

    // Initial load
    (async function init() {
        const [trending, popular, topRated] = await Promise.all([
            fetchMovies(`${TMDB_BASE}/trending/movie/week?api_key=${API_KEY}`),
            fetchMovies(`${TMDB_BASE}/movie/popular?api_key=${API_KEY}`),
            fetchMovies(`${TMDB_BASE}/movie/top_rated?api_key=${API_KEY}`)
        ]);
        trendingData = trending.length ? trending : [];
        popularData = popular.length ? popular : [];
        topRatedData = topRated.length ? topRated : [];
        
        if (trendingData.length) setHero(trendingData[0]);
        else if (popularData.length) setHero(popularData[0]);
        else if (topRatedData.length) setHero(topRatedData[0]);
        else setHero(FALLBACK_MOVIES[0]);
        
        buildDefaultRows();
        updateActiveNav("home");
    })();
</script>
</body>
</html>
