<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StreamHub — Watch Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #161622;
            --accent: #e50914;
            --accent-hover: #ff1a25;
            --accent-glow: rgba(229, 9, 20, 0.4);
            --accent-soft: rgba(229, 9, 20, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0bb;
            --text-muted: #6b6b7b;
            --card-radius: 14px;
            --card-radius-sm: 10px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            --glass-bg: rgba(18, 18, 26, 0.75);
            --glass-border: rgba(255, 255, 255, 0.07);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        /* NAVBAR (identical to index) */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 14px 36px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 36px;
        }
        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: -0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .logo:hover { transform: scale(1.03); }
        .logo-icon {
            font-size: 30px;
            color: var(--accent);
            filter: drop-shadow(0 0 12px var(--accent-glow));
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px var(--accent-glow)); }
            50% { filter: drop-shadow(0 0 22px rgba(229, 9, 20, 0.65)); }
        }
        .logo-text {
            background: linear-gradient(135deg, #e50914, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }
        .nav-links li {
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 6px 0;
            position: relative;
        }
        .nav-links li:hover {
            color: var(--text-primary);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 9px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        /* HERO BANNER */
        .hero-banner {
            position: relative;
            min-height: 480px;
            background-size: cover;
            background-position: center 30%;
            display: flex;
            align-items: flex-end;
            padding: 40px 48px 60px;
            margin-bottom: 30px;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-primary) 0%, rgba(10,10,15,0.8) 30%, rgba(0,0,0,0.4) 70%, transparent 100%);
            z-index: 1;
        }
        .hero-details {
            position: relative;
            z-index: 2;
            max-width: 650px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .hero-poster {
            width: 180px;
            border-radius: 16px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }
        .hero-info {
            flex: 1;
        }
        .hero-info h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }
        .hero-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .hero-rating {
            color: #ffc107;
            font-weight: 600;
        }
        .hero-year, .hero-duration {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .hero-genres {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .genre-badge {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .hero-overview {
            color: #c8c8d4;
            line-height: 1.6;
            margin-bottom: 24px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .trailer-btn {
            background: var(--accent);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(229,9,20,0.3);
        }
        .trailer-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        /* PLAYER SECTION */
        .player-wrapper {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 48px 20px;
            aspect-ratio: 16 / 9;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .server-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin: 10px 48px 20px;
            gap: 15px;
            background: var(--bg-secondary);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }
        .server-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .server-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .server-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .info-note {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* RECOMMENDATIONS ROW */
        .recommendations {
            margin: 40px 48px 30px;
        }
        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .rec-header h3 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rec-header h3 i {
            color: var(--accent);
        }
        .rec-row {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding-bottom: 12px;
        }
        .rec-card {
            min-width: 150px;
            width: 150px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            aspect-ratio: 2 / 3;
            cursor: pointer;
            transition: transform 0.25s ease;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .rec-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .rec-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .rec-title {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            font-size: 12px;
            font-weight: 600;
            z-index: 2;
            text-shadow: 0 1px 3px black;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* TOAST & LOADER */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.15);
            animation: fadeInUp 0.3s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px);}
            to { opacity: 1; transform: translateX(-50%) translateY(0);}
        }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a3a;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .navbar, .hero-banner { padding: 12px 20px; }
            .player-wrapper { margin: 0 16px 16px; }
            .server-bar { margin: 10px 16px 20px; flex-direction: column; align-items: stretch; }
            .recommendations { margin: 30px 16px; }
            .hero-poster { width: 120px; }
            .hero-info h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="logo">
            <span class="logo-icon"><i class="fa-solid fa-play"></i></span>
            <span class="logo-text">STREAMHUB</span>
        </a>
        <ul class="nav-links">
            <li onclick="location.href='index.html'">Home</li>
            <li onclick="location.href='index.html#movies'">Movies</li>
            <li onclick="location.href='index.html#series'">Series</li>
            <li onclick="location.href='index.html#popular'">New & Popular</li>
        </ul>
    </div>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Browse</a>
</nav>

<div id="heroBanner" class="hero-banner" style="background-image: none;">
    <div class="hero-details" id="heroDetails">
        <!-- dynamic content -->
    </div>
</div>

<div class="player-wrapper" id="playerContainer">
    <div class="loader"><div class="spinner"></div></div>
</div>

<div class="server-bar" id="serverBar">
    <div class="server-selector" id="serverList"></div>
    <div class="info-note" id="streamInfo">⚡ Select a server</div>
</div>

<div class="recommendations" id="recommendSection" style="display: none;">
    <div class="rec-header">
        <h3><i class="fa-solid fa-film"></i> More Like This</h3>
        <span style="font-size:12px; color:var(--accent);">↓ swipe →</span>
    </div>
    <div class="rec-row" id="recRow"></div>
</div>

<script>
    // ---------- TMDB API ----------
    const API_KEY = "e7f6bfe957eaa0d78540e0f5cecbb90b";
    let currentMedia = { type: "movie", id: null, season: null, episode: null };
    let mediaDetails = null;
    let currentServerId = "vidsrcto";
    let isLoadingPlayer = false;

    // ---------- SERVER LIST (embedded sources with ad-light approach) ----------
    const SERVER_LIST = [
        { id: "vidsrcto", label: "VidSrc", getUrl: (type, id, s, e) => type === "movie" ? `https://vidsrc.mov/embed/movie/${id}` : `https://vidsrc.mov/embed/tv/${id}/${s}/${e}` },
        { id: "vidzee", label: "VidZee", getUrl: (type, id, s, e) => type === "movie" ? `https://player.vidzee.wtf/embed/movie/${id}` : `https://player.vidzee.wtf/embed/tv/${id}/${s}/${e}` },
        { id: "vidrock", label: "VidRock", getUrl: (type, id, s, e) => type === "movie" ? `https://vidrock.net/movie/${id}` : `https://vidrock.net/tv/${id}/${s}/${e}` },
        { id: "riveembed", label: "RiveEmbed", getUrl: (type, id, s, e) => type === "movie" ? `https://riveembed.com/embed/movie/${id}` : `https://riveembed.com/embed/tv/${id}/${s}/${e}` },
        { id: "vidlink", label: "VidLink", getUrl: (type, id, s, e) => type === "movie" ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${s}/${e}` },
        { id: "embedsu", label: "Embed.su", getUrl: (type, id, s, e) => type === "movie" ? `https://embed.su/embed/movie/${id}` : `https://embed.su/embed/tv/${id}/${s}/${e}` },
        { id: "2embed", label: "2Embed", getUrl: (type, id, s, e) => type === "movie" ? `https://2embed.cc/embed/movie/${id}` : `https://2embed.cc/embed/tv/${id}/${s}/${e}` }
    ];

    // ---------- AD BLOCKER (remove common ad elements, popups, overlays) ----------
    function initAdBlocker() {
        // CSS to hide typical ad containers
        const style = document.createElement('style');
        style.textContent = `
            iframe[src*="adserver"], iframe[src*="doubleclick"], .ads, .ad, .advertisement, [class*="ad-"], [id*="ad_"], .google-ads, .banner-ad, .popup-ad, .overlay-ad, .video-ads {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                width: 0 !important;
                opacity: 0 !important;
                pointer-events: none !important;
            }
            body > div[style*="position: fixed"][style*="z-index"]:not(#toast):not(#playerContainer) {
                display: none !important;
            }
        `;
        document.head.appendChild(style);

        // MutationObserver to nuke suspicious iframes/elements that appear later
        const observer = new MutationObserver((mutations) => {
            mutations.forEach(() => {
                document.querySelectorAll('iframe, div').forEach(el => {
                    const src = el.src || '';
                    if (src.includes('adserver') || src.includes('doubleclick') || src.includes('googlesyndication') ||
                        (el.className && (el.className.includes('ad') || el.className.includes('ads'))) ||
                        (el.id && (el.id.includes('ad') || el.id.includes('google')))) {
                        el.remove();
                    }
                });
                // Remove any fixed overlays that look like popups
                document.querySelectorAll('div[style*="position: fixed"], div[style*="z-index: 9999"]').forEach(div => {
                    if (div.innerText && (div.innerText.includes('ad') || div.innerText.includes('Ad') || div.innerText.includes('Close'))) {
                        if (!div.closest('.toast') && !div.closest('#serverBar')) div.remove();
                    }
                });
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }

    // ---------- URL PARSING (fixes the hardcoded ID issue) ----------
    function parseURL() {
        const params = new URLSearchParams(window.location.search);
        let type = params.get('type');
        let id = params.get('id');
        let season = params.get('season');
        let episode = params.get('episode');

        if (!type && window.location.hash) {
            const hash = window.location.hash.substring(1);
            const hashParams = new URLSearchParams(hash.split('?')[1]);
            const hashPath = hash.split('?')[0];
            if (hashPath.startsWith('/movie/')) {
                type = 'movie';
                id = hashPath.split('/')[2];
            } else if (hashPath.startsWith('/tv/')) {
                type = 'tv';
                const parts = hashPath.split('/');
                id = parts[2];
                season = parts[3];
                episode = parts[4];
            }
            if (hashParams.get('server')) currentServerId = hashParams.get('server');
        }
        if (params.get('server')) currentServerId = params.get('server');

        if (!id) {
            // fallback demo but show error toast
            id = '550'; // Fight Club demo
            type = 'movie';
            console.warn('No ID provided, using demo movie');
        }
        currentMedia = { type: type === 'tv' ? 'tv' : 'movie', id: id, season: season ? parseInt(season) : 1, episode: episode ? parseInt(episode) : 1 };
    }

    // ---------- FETCH MEDIA DETAILS FROM TMDB ----------
    async function fetchMediaDetails() {
        const { type, id } = currentMedia;
        let url = type === 'movie' 
            ? `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`
            : `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Media not found');
            const data = await res.json();
            mediaDetails = data;
            return data;
        } catch (err) {
            console.error(err);
            showToast('❌ Could not load media details');
            return null;
        }
    }

    // ---------- RENDER BANNER (poster, backdrop, trailer button) ----------
    function renderHeroBanner(details) {
        const isMovie = currentMedia.type === 'movie';
        const title = isMovie ? details.title : details.name;
        const backdrop = details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : '';
        const poster = details.poster_path ? `https://image.tmdb.org/t/p/w300${details.poster_path}` : '';
        const rating = (details.vote_average / 2).toFixed(1);
        const year = isMovie ? (details.release_date?.substring(0,4) || '—') : (details.first_air_date?.substring(0,4) || '—');
        const genres = details.genres?.map(g => g.name).slice(0,3) || [];
        const overview = details.overview || 'No description available.';
        const trailerKey = details.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube')?.key || null;

        const bannerDiv = document.getElementById('heroBanner');
        if (backdrop) bannerDiv.style.backgroundImage = `url(${backdrop})`;
        bannerDiv.style.backgroundColor = '#0a0a0f';
        
        const heroHtml = `
            <img class="hero-poster" src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
            <div class="hero-info">
                <h1>${escapeHtml(title)}</h1>
                <div class="hero-meta">
                    <span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
                    <span class="hero-year">${year}</span>
                    ${isMovie ? '' : `<span>Season ${currentMedia.season || 1}</span>`}
                </div>
                <div class="hero-genres">
                    ${genres.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}
                </div>
                <p class="hero-overview">${escapeHtml(overview)}</p>
                ${trailerKey ? `<button class="trailer-btn" id="playTrailerBtn"><i class="fa-brands fa-youtube"></i> Watch Trailer</button>` : '<button class="trailer-btn" disabled style="opacity:0.5;"><i class="fa-solid fa-video"></i> Trailer unavailable</button>'}
            </div>
        `;
        document.getElementById('heroDetails').innerHTML = heroHtml;
        if (trailerKey) {
            document.getElementById('playTrailerBtn').addEventListener('click', () => {
                window.open(`https://www.youtube.com/watch?v=${trailerKey}`, '_blank');
            });
        }
    }

    // ---------- LOAD PLAYER (server embed) ----------
    async function loadPlayer() {
        if (isLoadingPlayer) return;
        isLoadingPlayer = true;
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
        const server = SERVER_LIST.find(s => s.id === currentServerId);
        if (!server) {
            container.innerHTML = '<div style="color:#f87171; text-align:center; padding:40px;">⚠️ Server not found</div>';
            isLoadingPlayer = false;
            return;
        }
        try {
            let embedUrl;
            if (currentMedia.type === 'movie') {
                embedUrl = server.getUrl('movie', currentMedia.id, null, null);
            } else {
                const s = currentMedia.season || 1;
                const e = currentMedia.episode || 1;
                embedUrl = server.getUrl('tv', currentMedia.id, s, e);
            }
            // Add ad-block referrer and remove sandbox to avoid ad restrictions
            const finalUrl = embedUrl;
            container.innerHTML = `<iframe src="${finalUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
        } catch (err) {
            container.innerHTML = `<div style="color:#f87171; text-align:center; padding:40px;">Failed to load video: ${err.message}</div>`;
        }
        isLoadingPlayer = false;
    }

    // ---------- RENDER SERVER BUTTONS ----------
    function renderServerButtons() {
        const container = document.getElementById('serverList');
        container.innerHTML = '';
        SERVER_LIST.forEach(server => {
            const btn = document.createElement('button');
            btn.textContent = server.label;
            btn.classList.add('server-btn');
            if (server.id === currentServerId) btn.classList.add('active');
            btn.onclick = () => {
                currentServerId = server.id;
                renderServerButtons();
                loadPlayer();
                showToast(`Switched to ${server.label}`);
            };
            container.appendChild(btn);
        });
    }

    // ---------- FETCH RECOMMENDATIONS & RENDER ROW ----------
    async function loadRecommendations() {
        const { type, id } = currentMedia;
        let url = type === 'movie' 
            ? `https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`
            : `https://api.themoviedb.org/3/tv/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const results = data.results?.slice(0, 12) || [];
            if (results.length === 0) {
                document.getElementById('recommendSection').style.display = 'none';
                return;
            }
            const row = document.getElementById('recRow');
            row.innerHTML = '';
            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : '';
                card.style.backgroundImage = `url(${poster})`;
                card.style.backgroundSize = 'cover';
                const title = item.title || item.name;
                card.innerHTML = `<div class="rec-title">${escapeHtml(title)}</div>`;
                card.onclick = () => {
                    const newType = item.title ? 'movie' : 'tv';
                    const newId = item.id;
                    window.location.href = `watch.html?type=${newType}&id=${newId}`;
                };
                row.appendChild(card);
            });
            document.getElementById('recommendSection').style.display = 'block';
        } catch (err) {
            console.error(err);
            document.getElementById('recommendSection').style.display = 'none';
        }
    }

    // ---------- HELPERS ----------
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast?.remove(), 3000);
    }

    // ---------- MAIN INIT ----------
    async function init() {
        initAdBlocker();
        parseURL();
        const details = await fetchMediaDetails();
        if (!details) {
            document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">Failed to load content. Check ID.</div>';
            return;
        }
        renderHeroBanner(details);
        renderServerButtons();
        await loadPlayer();
        await loadRecommendations();
        document.getElementById('streamInfo').innerHTML = `🎥 Now streaming: ${details.title || details.name} • Server: ${SERVER_LIST.find(s=>s.id===currentServerId)?.label}`;
    }
    init();
</script>
</body>
</html>
