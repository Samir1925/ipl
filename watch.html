<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>StreamHub — Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --accent: #e50914;
            --accent-hover: #ff1a25;
            --accent-glow: rgba(229,9,20,0.35);
            --text-primary: #ffffff;
            --text-secondary: #b0b0bb;
            --text-muted: #6b6b7b;
            --card-radius: 12px;
            --bottom-nav-bg: rgba(10,10,15,0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a, button { -webkit-tap-highlight-color: transparent; text-decoration: none; color: inherit; }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        /* ========= NAVBAR (same as index) ========= */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 14px 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 60%, transparent 100%);
            backdrop-filter: blur(20px);
            transition: all 0.2s;
        }
        .navbar.scrolled {
            background: rgba(10,10,15,0.97);
            padding: 10px 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-size: 24px; font-weight: 900; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .logo-icon { font-size: 26px; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .logo-text { background: linear-gradient(135deg,#e50914,#ff4d4d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: none; list-style: none; gap: 24px; }
        @media (min-width: 768px) { .nav-links { display: flex; } }
        .nav-links li {
            cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--text-secondary); transition: 0.2s;
        }
        .nav-links li:hover, .nav-links li.active { color: white; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-icon { background: none; border: none; color: var(--text-secondary); font-size: 20px; cursor: pointer; padding: 8px; }
        .search-container { position: relative; }
        .search-input-wrap {
            position: absolute; right: 0; top: 50%; transform: translateY(-50%);
            width: 0; overflow: hidden; transition: width 0.35s;
            background: rgba(20,20,30,0.95); backdrop-filter: blur(16px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.15);
            display: flex; align-items: center;
        }
        .search-input-wrap.active { width: 220px; padding: 0 14px; }
        .search-input-wrap input { width: 100%; background: transparent; border: none; outline: none; color: white; font-size: 14px; padding: 10px 0; }
        .close-search { color: white; cursor: pointer; margin-left: 8px; }

        /* ========= BOTTOM NAV (mobile) ========= */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bottom-nav-bg); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; justify-content: space-around; align-items: center;
            padding: 8px 12px 12px; z-index: 1000;
        }
        @media (min-width: 768px) { .bottom-nav { display: none; } }
        .bottom-nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
            padding: 4px 12px; border-radius: 30px; background: transparent;
        }
        .bottom-nav-item i { font-size: 22px; }
        .bottom-nav-item span { font-size: 11px; font-weight: 500; }
        .bottom-nav-item.active { color: var(--accent); background: rgba(229,9,20,0.12); }

        /* ========= HERO BANNER ========= */
        .hero-banner {
            margin-top: 70px;
            min-height: 58vh;
            background-size: cover;
            background-position: top 20% center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2rem 5%;
        }
        .hero-banner.hidden { display: none; }
        .hero-banner::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, #0a0a0f 25%, transparent 85%);
        }
        .hero-details { display: flex; gap: 2rem; max-width: 1300px; position: relative; z-index: 2; flex-wrap: wrap; }
        .hero-poster { width: 200px; border-radius: 18px; box-shadow: 0 20px 30px -8px black; object-fit: cover; }
        .hero-info { flex: 1; }
        .hero-info h1 { font-size: clamp(1.8rem,5vw,2.8rem); font-weight: 800; margin-bottom: 0.6rem; letter-spacing: -0.02em; }
        .hero-meta { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
        .hero-rating i { color: gold; }
        .hero-year, .hero-rating { background: rgba(0,0,0,0.55); padding: 5px 12px; border-radius: 30px; font-weight: 500; font-size: 0.9rem; backdrop-filter: blur(4px); }
        .genre-badge { background: #e50914; padding: 5px 14px; border-radius: 40px; font-size: 0.75rem; font-weight: 700; margin-right: 8px; margin-bottom: 8px; display: inline-block; }
        .hero-overview { max-width: 650px; line-height: 1.5; margin: 1rem 0; opacity: 0.9; font-size: clamp(0.85rem,2.5vw,1rem); }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .btn-primary, .btn-secondary {
            padding: 12px 28px; border-radius: 44px; font-weight: 700;
            border: none; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: #e50914; color: white; box-shadow: 0 4px 10px rgba(229,9,20,0.3); }
        .btn-primary:hover { background: #b00710; transform: scale(1.02); }
        .btn-secondary { background: rgba(255,255,255,0.12); color: white; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.28); }

        /* ========= PLAYER ========= */
        .player-section { background: #000; display: none; }
        .player-section.visible { display: block; }
        .nav-overlap-guard { display: none; width: 100%; background: transparent; }
        .player-section.visible .nav-overlap-guard { display: block; height: 72px; }
        @media (max-width: 768px) { .player-section.visible .nav-overlap-guard { height: 64px; } }
        .player-wrapper { position: relative; width: 100%; background: black; overflow: hidden; }
        .player-wrapper iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
        .server-bar {
            background: #0d0d14; padding: 1rem 1.8rem;
            display: flex; flex-wrap: wrap; gap: 1rem;
            justify-content: space-between; align-items: center;
            border-top: 1px solid #252530; border-bottom: 1px solid #1a1a24;
        }
        .server-selector { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .server-btn {
            background: #1e1e2a; border: none; padding: 8px 20px; border-radius: 60px;
            color: #eee; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s;
        }
        .server-btn:hover { background: #2d2d3a; transform: translateY(-2px); }
        .server-btn.active { background: #e50914; color: white; box-shadow: 0 4px 12px rgba(229,9,20,0.4); }
        .episode-controls {
            display: flex; gap: 16px; align-items: center;
            background: rgba(20,20,30,0.8); backdrop-filter: blur(8px);
            padding: 6px 18px; border-radius: 60px; border: 1px solid #2c2c3c;
        }
        .episode-controls i { font-size: 1rem; color: #e50914; }
        .episode-controls select {
            background: #24242f; border: none; color: white;
            padding: 8px 20px; border-radius: 40px; font-weight: 500;
            font-size: 0.85rem; cursor: pointer; outline: none; transition: all 0.2s;
        }
        .episode-controls select:hover { background: #3a3a48; }
        .info-note { font-size: 0.75rem; color: #bbb; background: #0f0f16; padding: 6px 14px; border-radius: 50px; }
        .show-info-btn {
            background: rgba(108,92,231,0.2); border: 1px solid #6c5ce7;
            padding: 6px 18px; border-radius: 40px; font-size: 0.78rem;
            font-weight: 600; cursor: pointer; transition: 0.2s; color: white;
        }
        .show-info-btn:hover { background: #6c5ce7; }

        /* ========= RECOMMENDATIONS ========= */
        .recommendations { padding: 2rem 5%; background: var(--bg-primary); padding-bottom: 80px; }
        .rec-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; }
        .rec-row { display: flex; gap: 18px; overflow-x: auto; scrollbar-width: thin; padding-bottom: 12px; }
        .rec-card {
            min-width: 140px; height: 210px; background-size: cover; background-position: center;
            border-radius: 16px; position: relative; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        .rec-card:hover { transform: scale(0.97); filter: brightness(0.85); }
        .rec-title {
            position: absolute; bottom: 0;
            background: linear-gradient(transparent, #000000dd);
            width: 100%; padding: 12px 8px; font-size: 0.8rem;
            font-weight: bold; border-radius: 0 0 16px 16px;
        }

        /* ========= TRAILER MODAL ========= */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content iframe { width: 80vw; height: 45vw; max-width: 1000px; max-height: 562px; border-radius: 16px; border: none; }
        .close-modal { position: absolute; top: 25px; right: 35px; font-size: 2rem; color: white; cursor: pointer; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ========= TOAST ========= */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #1f1f2ae6; backdrop-filter: blur(12px);
            padding: 12px 28px; border-radius: 60px; color: white;
            z-index: 4000; font-size: 0.85rem; border-left: 5px solid #e50914; font-weight: 500;
        }
        @media (min-width: 768px) { .toast { bottom: 30px; } }

        /* ========= LOADER ========= */
        .loader .spinner { border: 3px solid #2a2a35; border-top: 3px solid #e50914; width: 44px; height: 44px; border-radius: 50%; margin: 60px auto; animation: spin 0.9s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========= RESPONSIVE ========= */
        @media (max-width: 1024px) {
            .server-bar { padding: 1rem; flex-direction: column; align-items: stretch; }
            .episode-controls { justify-content: center; width: fit-content; margin: 0 auto; }
            .server-selector { justify-content: center; }
            .hero-poster { width: 140px; }
        }
        @media (max-width: 768px) {
            .hero-poster { width: 110px; }
            .server-btn { padding: 6px 14px; font-size: 0.75rem; }
            .episode-controls select { padding: 6px 14px; font-size: 0.75rem; }
            .rec-card { min-width: 110px; height: 170px; }
        }
        @media (max-width: 480px) {
            .hero-banner { padding: 1rem 4%; }
            .btn-primary, .btn-secondary { padding: 8px 20px; font-size: 0.85rem; }
        }
    </style>
</head>

<script>
/* ============================================================
   AD SHIELD — runs first, before anything else
   ============================================================ */
(function () {
    const AD_DOMAINS = [
        'doubleclick','googlesyndication','googleadservices','adservice','adserver',
        'exoior','popads','adnxs','adroll','outbrain','taboola','mgid','revcontent',
        'criteo','mediatraffic','adfox','adblade','popunder','clickaine','chaturbate',
        'trafficjunky','adsterra','propellerads','plugrush','exoclick','clickadu',
        'adcash','adskeeper','juicyads','hilltopads','trafficstars','oxanads',
        'richpush','pushground','adspyglass','a-ads','coinzilla','ad-sterra',
        'realsrv','inpage','onclicka','onclickads','clkrev','traficforce'
    ];

    const isAdUrl = url => {
        if (!url || typeof url !== 'string') return false;
        const u = url.toLowerCase();
        return AD_DOMAINS.some(d => u.includes(d))
            || /\/(ad|ads|advert|banner|popup|popunder|click)\//i.test(u)
            || /[?&](ad|ads|adunit|adid|adtype|popup)=/i.test(u);
    };

    /* 1. Block window.open popups */
    const _open = window.open.bind(window);
    window.open = function (url, target, features) {
        if (isAdUrl(url)) { console.log('[AdShield] popup blocked:', url); return null; }
        return _open(url, target, features);
    };

    /* 2. Intercept top-level navigation (redirects) */
    const _assign   = location.assign.bind(location);
    const _replace  = location.replace.bind(location);
    location.assign  = url => { if (!isAdUrl(url)) _assign(url); else console.log('[AdShield] redirect blocked'); };
    location.replace = url => { if (!isAdUrl(url)) _replace(url); else console.log('[AdShield] redirect blocked'); };

    /* 3. Block new tab attempts via <a target="_blank"> injected by ads */
    document.addEventListener('click', e => {
        const a = e.target.closest('a');
        if (a && a.target === '_blank' && isAdUrl(a.href)) {
            e.preventDefault(); e.stopImmediatePropagation();
            console.log('[AdShield] link blocked:', a.href);
        }
    }, true);

    /* 4. Remove ad DOM elements */
    const AD_SELECTORS = [
        'iframe[src*="doubleclick"]','iframe[src*="googlesyndication"]',
        'iframe[src*="adsterra"]','iframe[src*="propellerads"]',
        'iframe[src*="exoclick"]','iframe[src*="clickadu"]',
        '.adsbygoogle','[id*="google_ads"]','[class*="ad-banner"]',
        '[class*="popunder"]','[id*="popunder"]',
        'div[id^="ad-"]','div[class^="ad-"]',
        'ins.adsbygoogle','[data-ad-slot]','[data-ad-unit]'
    ].join(',');

    const removeAds = () => {
        try { document.querySelectorAll(AD_SELECTORS).forEach(el => el.remove()); } catch {}
        /* also sweep by src attribute */
        document.querySelectorAll('iframe,script,img').forEach(el => {
            if (isAdUrl(el.src || el.getAttribute('src') || '')) el.remove();
        });
    };

    new MutationObserver(removeAds).observe(document.documentElement, { childList: true, subtree: true });
    setInterval(removeAds, 800);

    /* 5. CSS nuke for common ad containers */
    const style = document.createElement('style');
    style.textContent = `
        .adsbygoogle, [id*="google_ads"], [class*="ad-container"],
        [class*="popup-ad"], [class*="popunder"], [id*="popunder"],
        div[id^="ad-"]:not(#playerContainer):not(#heroDetails),
        ins[class*="adsbygoogle"] {
            display: none !important; visibility: hidden !important;
            height: 0 !important; width: 0 !important; opacity: 0 !important;
        }
    `;
    document.head.appendChild(style);

    /* 6. Prevent focus-steal (common tab-hijack trick) */
    window.addEventListener('blur', () => {
        setTimeout(() => {
            if (document.hidden) return;   // legit tab switch
            window.focus();
        }, 100);
    });

    console.log('[AdShield] ✅ Active');
})();

/* ============================================================
   URL PARSING
   ============================================================ */
function parseURL() {
    const p = new URLSearchParams(window.location.search);
    const type = p.get('type');
    const id   = p.get('id');
    if (!id) { showToast('Demo: Fight Club'); }
    currentMedia = {
        type:    type === 'tv' ? 'tv' : 'movie',
        id:      id || '550',
        season:  p.get('season')  ? parseInt(p.get('season'))  : 1,
        episode: p.get('episode') ? parseInt(p.get('episode')) : 1
    };
}

/* ============================================================
   TMDB
   ============================================================ */
async function fetchMediaDetails() {
    const { type, id } = currentMedia;
    const url = type === 'movie'
        ? `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&append_to_response=videos,recommendations`
        : `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&append_to_response=videos,recommendations`;
    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error();
        const data = await res.json();
        mediaDetails = data;
        if (type === 'tv' && data.seasons) {
            seasonList = data.seasons.filter(s => s.season_number > 0).map(s => ({ season_number: s.season_number, episode_count: s.episode_count }));
            if (seasonList.length && !seasonList.find(s => s.season_number === currentMedia.season))
                currentMedia.season = seasonList[0].season_number;
        }
        return data;
    } catch { showToast('⚠️ Failed to load details'); return null; }
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

/* ============================================================
   HERO BANNER
   ============================================================ */
function renderHeroBanner(d) {
    const isMovie = currentMedia.type === 'movie';
    const title   = isMovie ? d.title : d.name;
    const backdrop = d.backdrop_path ? `https://image.tmdb.org/t/p/original${d.backdrop_path}` : '';
    const poster   = d.poster_path   ? `https://image.tmdb.org/t/p/w300${d.poster_path}` : '';
    const rating   = (d.vote_average / 2).toFixed(1);
    const year     = isMovie ? (d.release_date?.substring(0,4)||'—') : (d.first_air_date?.substring(0,4)||'—');
    const genres   = d.genres?.map(g => g.name).slice(0,3) || [];
    const overview = d.overview || 'Stream with best quality and ad protection.';
    const trailer  = d.videos?.results?.find(v => v.type==='Trailer' && v.site==='YouTube');
    trailerKey = trailer ? trailer.key : null;

    const banner = document.getElementById('heroBanner');
    if (backdrop) banner.style.backgroundImage = `url(${backdrop})`;

    document.getElementById('heroDetails').innerHTML = `
        <img class="hero-poster" src="${poster}" alt="${escapeHtml(title)}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
        <div class="hero-info">
            <h1>${escapeHtml(title)}</h1>
            <div class="hero-meta">
                <span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
                <span class="hero-year">${year}</span>
                ${!isMovie ? `<span style="background:rgba(0,0,0,0.55);padding:5px 12px;border-radius:30px;font-size:.9rem">S${currentMedia.season||1}</span>` : ''}
            </div>
            <div>${genres.map(g=>`<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>
            <p class="hero-overview">${escapeHtml(overview)}</p>
            <div class="action-buttons">
                <button class="btn-primary" id="watchNowBtn"><i class="fa-solid fa-play"></i> Watch Now</button>
                <button class="btn-secondary" id="trailerBtn" ${!trailerKey?'disabled style="opacity:.5"':''}>
                    <i class="fa-brands fa-youtube"></i> Trailer
                </button>
            </div>
        </div>`;

    document.getElementById('watchNowBtn').addEventListener('click', revealAndLoadPlayer);
    if (trailerKey) document.getElementById('trailerBtn').addEventListener('click', openTrailerModal);
}

/* ============================================================
   PLAYER
   ============================================================ */
function revealAndLoadPlayer() {
    document.getElementById('heroBanner').classList.add('hidden');
    const ps = document.getElementById('playerSection');
    ps.classList.add('visible');
    ps.scrollIntoView({ behavior: 'smooth', block: 'start' });
    loadPlayer();
    if (currentMedia.type === 'tv') setupEpisodeControls();
}

function setupEpisodeControls() {
    const ctrl = document.getElementById('episodeControls');
    if (currentMedia.type !== 'tv' || !seasonList.length) { ctrl.style.display='none'; return; }
    ctrl.style.display = 'flex';
    const ss = document.getElementById('seasonSelect');
    const es = document.getElementById('episodeSelect');
    ss.innerHTML = '';
    seasonList.forEach(s => {
        const o = document.createElement('option');
        o.value = s.season_number; o.textContent = `Season ${s.season_number}`;
        if (s.season_number === currentMedia.season) o.selected = true;
        ss.appendChild(o);
    });
    const refreshEps = () => {
        const sel = seasonList.find(s => s.season_number === parseInt(ss.value));
        const max = sel ? sel.episode_count : 12;
        es.innerHTML = '';
        for (let i = 1; i <= max; i++) {
            const o = document.createElement('option');
            o.value = i; o.textContent = `Episode ${i}`;
            if (i === currentMedia.episode && parseInt(ss.value) === currentMedia.season) o.selected = true;
            es.appendChild(o);
        }
    };
    refreshEps();
    ss.onchange = () => { currentMedia.season = parseInt(ss.value); currentMedia.episode = 1; refreshEps(); if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer(); };
    es.onchange = () => { currentMedia.episode = parseInt(es.value); if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer(); };
}

async function loadPlayer() {
    const container = document.getElementById('playerContainer');
    container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
    const srv = SERVER_LIST.find(s => s.id === currentServerId);
    if (!srv) { container.innerHTML = '<div style="color:#f87171;text-align:center;padding:40px">Server error</div>'; return; }
    const { type, id, season, episode } = currentMedia;
    if (srv.isAsync) {
        let url = `player.html?type=${type}&id=${id}&api=${srv.apiVersion}`;
        if (type==='tv') url += `&season=${season||1}&episode=${episode||1}`;
        container.innerHTML = `<iframe src="${url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe>`;
        document.getElementById('streamInfo').innerHTML = `🎥 ${srv.label} · ad‑free`;
    } else {
        const embedUrl = type==='movie' ? srv.getUrl('movie',id) : srv.getUrl('tv',id,season||1,episode||1);
        container.innerHTML = `<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>`;
        document.getElementById('streamInfo').innerHTML = `🎥 ${srv.label} · AdShield 🛡️`;
    }
}

function renderServerButtons() {
    const cont = document.getElementById('serverList');
    cont.innerHTML = '';
    SERVER_LIST.forEach(srv => {
        const btn = document.createElement('button');
        btn.className = 'server-btn' + (srv.id === currentServerId ? ' active' : '');
        btn.textContent = srv.label;
        btn.onclick = () => { currentServerId = srv.id; renderServerButtons(); if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer(); showToast(`Switched to ${srv.label}`); };
        cont.appendChild(btn);
    });
}

/* ============================================================
   TRAILER MODAL
   ============================================================ */
function openTrailerModal() {
    if (!trailerKey) return;
    document.getElementById('trailerFrameContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1" allowfullscreen></iframe>`;
    document.getElementById('trailerModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeTrailerModal() {
    document.getElementById('trailerModal').classList.remove('active');
    document.getElementById('trailerFrameContainer').innerHTML = '';
    document.body.style.overflow = '';
}

/* ============================================================
   RECOMMENDATIONS
   ============================================================ */
async function loadRecommendations() {
    const { type, id } = currentMedia;
    const url = type==='movie'
        ? `https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}&page=1`
        : `https://api.themoviedb.org/3/tv/${id}/recommendations?api_key=${API_KEY}&page=1`;
    try {
        const res = await fetch(url); const data = await res.json();
        const results = (data.results||[]).slice(0,12);
        if (!results.length) { document.getElementById('recommendSection').style.display='none'; return; }
        const row = document.getElementById('recRow'); row.innerHTML = '';
        results.forEach(item => {
            if (!item.poster_path) return;
            const card = document.createElement('div'); card.className = 'rec-card';
            card.style.backgroundImage = `url(https://image.tmdb.org/t/p/w200${item.poster_path})`;
            card.innerHTML = `<div class="rec-title">${escapeHtml(item.title||item.name)}</div>`;
            card.onclick = () => location.href = `watch.html?type=${item.title?'movie':'tv'}&id=${item.id}`;
            row.appendChild(card);
        });
        document.getElementById('recommendSection').style.display = 'block';
    } catch { document.getElementById('recommendSection').style.display = 'none'; }
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg) {
    document.querySelector('.toast')?.remove();
    const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
}

/* ============================================================
   SEARCH (same as index — redirects back to index with query)
   ============================================================ */
function openSearch() {
    const wrap = document.getElementById('searchWrap');
    wrap.classList.add('active');
    document.getElementById('searchInput').focus();
    document.getElementById('searchToggle').style.opacity = '0';
    setTimeout(() => document.getElementById('searchToggle').style.display='none', 200);
}
function closeSearch() {
    const wrap = document.getElementById('searchWrap');
    wrap.classList.remove('active');
    document.getElementById('searchInput').value = '';
    document.getElementById('searchToggle').style.display='flex';
    document.getElementById('searchToggle').style.opacity='1';
}
document.getElementById('searchToggle').addEventListener('click', e => { e.stopPropagation(); openSearch(); });
document.getElementById('closeSearchBtn').addEventListener('click', e => { e.stopPropagation(); closeSearch(); });
document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.value.trim()) {
        location.href = `index.html?search=${encodeURIComponent(e.target.value.trim())}`;
    }
    if (e.key === 'Escape') closeSearch();
});
document.addEventListener('click', e => {
    if (!document.querySelector('.search-container').contains(e.target)) closeSearch();
});

/* ============================================================
   SCROLL / NAVBAR
   ============================================================ */
window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
});

/* ============================================================
   SHOW INFO TOGGLE
   ============================================================ */
document.getElementById('showInfoBtn').addEventListener('click', () => {
    const h = document.getElementById('heroBanner');
    if (h.classList.contains('hidden')) { h.classList.remove('hidden'); h.scrollIntoView({ behavior:'smooth', block:'start' }); }
    else h.classList.add('hidden');
});

/* ============================================================
   MODAL CLOSE
   ============================================================ */
document.getElementById('closeModalBtn').addEventListener('click', closeTrailerModal);
window.addEventListener('click', e => { if (e.target === document.getElementById('trailerModal')) closeTrailerModal(); });

/* ============================================================
   INIT
   ============================================================ */
(async function init() {
    parseURL();
    const details = await fetchMediaDetails();
    if (details) {
        renderHeroBanner(details);
        renderServerButtons();
        await loadRecommendations();
        if (currentMedia.type === 'tv') setupEpisodeControls();
    } else {
        document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">Failed to load media</div>';
    }
})();
</script>
</body>
</html>
