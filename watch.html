<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>StreamHub — Watch Now | Fluid Player & Ad Shield</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(14px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .navbar.scrolled {
            background: #0a0a0fcc;
            backdrop-filter: blur(20px);
            padding: 0.7rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon i {
            font-size: 1.8rem;
            color: #e50914;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 30%, #e50914 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            margin-left: 2rem;
        }
        .nav-links li {
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links li:hover { color: #e50914; }
        .nav-right { display: flex; align-items: center; gap: 1rem; }
        .back-btn {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            color: white;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .back-btn i { margin-right: 8px; }
        .back-btn:hover { background: #e50914; }
        .menu-btn { display: none; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }

        .mobile-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #111118;
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: right 0.3s ease;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .mobile-menu.open { right: 0; }
        .close-menu { align-self: flex-end; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .nav-item { font-size: 1.3rem; font-weight: 600; cursor: pointer; padding: 10px 0; border-bottom: 1px solid #2a2a35; }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1500;
            display: none;
        }
        .overlay.active { display: block; }

        .hero-banner {
            margin-top: 70px;
            min-height: 65vh;
            background-size: cover;
            background-position: top 20% center;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2rem 5%;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .hero-banner.hidden {
            display: none;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #0a0a0f 30%, transparent 90%);
        }
        .hero-details {
            display: flex;
            gap: 2rem;
            max-width: 1300px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }
        .hero-poster {
            width: 220px;
            border-radius: 16px;
            box-shadow: 0 20px 30px -10px black;
            object-fit: cover;
        }
        .hero-info { flex: 1; }
        .hero-info h1 { font-size: 2.6rem; font-weight: 800; margin-bottom: 0.5rem; }
        .hero-meta { display: flex; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
        .hero-rating i { color: gold; }
        .hero-year, .hero-rating { background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
        .genre-badge { background: #e50914; padding: 5px 14px; border-radius: 30px; font-size: 0.8rem; font-weight: 600; margin-right: 8px; display: inline-block; margin-bottom: 8px; }
        .hero-overview { max-width: 650px; line-height: 1.5; margin: 1.2rem 0; opacity: 0.9; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .btn-primary, .btn-secondary {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: #e50914; color: white; }
        .btn-primary:hover { background: #b00710; transform: scale(1.02); }
        .btn-secondary { background: rgba(255,255,255,0.15); color: white; backdrop-filter: blur(4px); }
        .btn-secondary:hover { background: rgba(255,255,255,0.3); }

        .player-section {
            background: #000000;
            margin: 0;
            padding: 0;
            transition: all 0.2s;
            display: none;
        }
        .player-section.visible {
            display: block;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            background: black;
            margin: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }
        .player-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
            margin: 0;
            padding: 0;
        }
        .server-bar {
            background: #14141c;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #2c2c38;
        }
        .server-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .server-btn {
            background: #1f1f2a;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ddd;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .server-btn.active {
            background: #e50914;
            color: white;
        }
        .info-note {
            font-size: 0.8rem;
            color: #aaa;
        }
        .episode-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #1f1f2a;
            padding: 6px 16px;
            border-radius: 40px;
        }
        .episode-controls select {
            background: #2a2a35;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
        }
        .show-info-btn {
            background: rgba(108,92,231,0.2);
            border: 1px solid #6c5ce7;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .show-info-btn:hover {
            background: #6c5ce7;
            color: white;
        }

        .recommendations {
            padding: 2rem 5%;
            background: #0a0a0f;
        }
        .rec-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
        }
        .rec-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 10px;
        }
        .rec-card {
            min-width: 140px;
            height: 210px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 4px 12px black;
        }
        .rec-card:hover { transform: scale(0.98); opacity: 0.9; }
        .rec-title {
            position: absolute;
            bottom: 0;
            background: linear-gradient(transparent, #000000dd);
            width: 100%;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 0 0 12px 12px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content iframe {
            width: 80vw;
            height: 45vw;
            max-width: 1000px;
            max-height: 562px;
            border: none;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1f2ade;
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 4000;
            font-size: 0.9rem;
            border-left: 4px solid #e50914;
        }

        @media (max-width: 1024px) {
            .player-section, .player-wrapper, .player-wrapper iframe {
                margin: 0 !important;
                padding: 0 !important;
                border-radius: 0 !important;
                border: none !important;
            }
            .server-bar {
                padding: 12px 12px;
            }
            .hero-banner {
                padding: 1rem 4%;
            }
            .hero-poster {
                width: 140px;
            }
            .hero-info h1 {
                font-size: 1.8rem;
            }
        }
        @media (max-width: 768px) {
            .navbar {
                padding: 0.8rem 1rem;
            }
            .nav-links {
                display: none;
            }
            .menu-btn {
                display: block;
            }
            .back-btn span {
                display: none;
            }
            .back-btn i {
                margin: 0;
            }
            .player-wrapper iframe {
                aspect-ratio: 16/9;
                width: 100%;
                height: auto;
                min-height: 240px;
            }
            .hero-details {
                gap: 1rem;
            }
            .hero-poster {
                width: 110px;
            }
            .episode-controls {
                width: 100%;
                justify-content: center;
            }
            .rec-card {
                min-width: 110px;
                height: 165px;
            }
        }
        .player-wrapper, .player-section, .server-bar, iframe {
            border: none !important;
            outline: none;
        }
    </style>
</head>

    (function() {
        // AD BLOCKER (same robust shield)
        const AD_DOMAINS = [
            'doubleclick', 'googlesyndication', 'googleadservices', 'adservice', 'adserver', 'exoior', 'popads', 'adnxs',

        const originalWindowOpen = window.open;
        window.open = function(url, target, features) {
            if (url && typeof url === 'string') {
                const lowerUrl = url.toLowerCase();
                if (AD_DOMAINS.some(domain => lowerUrl.includes(domain)) || lowerUrl.includes('ad') && lowerUrl.match(/click|pop/)) {
                    console.log('[AdBlock] blocked popup:', url);
                    return null;
                }
            }
            return originalWindowOpen ? originalWindowOpen.call(window, url, target, features) : null;
        };
        function destroyAdElements() {
            const allElements = document.querySelectorAll('iframe, div, ins, object, embed, script');
            allElements.forEach(el => {
                let shouldRemove = false;
                if (el.src) {
                    const src = el.src.toLowerCase();
                    if (AD_DOMAINS.some(domain => src.includes(domain))) shouldRemove = true;
                    if (src.includes('ad') && (src.includes('banner') || src.includes('pop'))) shouldRemove = true;
                }
                if (el.id && (el.id.toLowerCase().includes('ad') || el.id.toLowerCase().includes('google_ads'))) shouldRemove = true;
                if (el.className && typeof el.className === 'string') {
                    const cls = el.className.toLowerCase();
                    if (cls.includes('ad-') || cls.includes('_ad') || cls.includes('advertisement') || cls.includes('ads')) shouldRemove = true;
                }
                if (el.getAttribute('class') && el.getAttribute('class').includes('ad')) shouldRemove = true;
                if (el.style && (el.style.position === 'fixed' && (el.style.zIndex === '999999' || (el.style.bottom === '0px' && el.style.height === 'auto')))) {
                    shouldRemove = true;
                }
                if (shouldRemove && el.parentNode) el.remove();
            });
        }
        const observer = new MutationObserver(() => destroyAdElements());
        observer.observe(document.body, { childList: true, subtree: true });
        setInterval(destroyAdElements, 800);
        const originalFetch = window.fetch;
        window.fetch = function(input, init) {
            let url = typeof input === 'string' ? input : input.url;
            if (url && AD_DOMAINS.some(domain => url.toLowerCase().includes(domain))) {
                console.log('[AdBlock] Fetch blocked:', url);
                return Promise.reject(new Error('Blocked by adshield'));
            }
            return originalFetch.call(this, input, init);
        };
        const originalAppendChild = Node.prototype.appendChild;
        Node.prototype.appendChild = function(child) {
            if (child && child.tagName === 'IFRAME') {
                let src = child.src || '';
                if (AD_DOMAINS.some(domain => src.toLowerCase().includes(domain))) {
                    console.log('[AdBlock] Prevented ad iframe insertion');
                    return child;
                }
            }
            return originalAppendChild.call(this, child);
        };
        const style = document.createElement('style');
        style.textContent = `
            iframe[src*="doubleclick"], iframe[src*="googlesyndication"], iframe[src*="adservice"], .adsbygoogle, [id*="google_ads"], .ad-container, .ad-banner, .advertisement, [class*="ad_"], [class*="-ad"], [data-ad], #adcontent, .popup_ads, .sticky-ad { display: none !important; visibility: hidden !important; height:0 !important; width:0 !important; pointer-events:none !important; }
            body > div[style*="z-index: 9999"], body > div[style*="position: fixed"][style*="bottom"] { display: none !important; }
        `;
        document.head.appendChild(style);
        const originalInsertAdjacentHTML = Element.prototype.insertAdjacentHTML;
        Element.prototype.insertAdjacentHTML = function(position, text) {
            if (text && (text.includes('adservice') || text.includes('googleadservices'))) return;
            return originalInsertAdjacentHTML.call(this, position, text);
        };
    })();

        { id: "multiembed", label: "MultiEmbed", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://multiembed.cc/movie/${id}` : `https://multiembed.cc/tv/${id}/${s}/${e}` },
        { id: "vidsrc-xyz", label: "VidSrc.xyz", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://vidsrc.xyz/embed/movie/${id}` : `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}` },
        { id: "primewire", label: "PrimeWire", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://embed.primewire.tf/movie/${id}` : `https://embed.primewire.tf/tv/${id}/${s}/${e}` },
        { id: "warezcdn", label: "WarezCDN", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://warezcdn.com/embed/movie/${id}` : `https://warezcdn.com/embed/tv/${id}/${s}/${e}` },
        { id: "superflix", label: "SuperFlix", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://embed.superflix.to/movie/${id}` : `https://embed.superflix.to/tv/${id}/${s}/${e}` },
        { id: "vidup", label: "VidUp", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://vidup.me/embed/${id}` : `https://vidup.me/embed/${id}?season=${s}&episode=${e}` }
    ];

    function parseURL() {
        const params = new URLSearchParams(window.location.search);
        let type = params.get('type');
        let id = params.get('id');
        let season = params.get('season');
        let episode = params.get('episode');
        if (!id) { id = '550'; type = 'movie'; showToast('Demo: Inception'); }
        currentMedia = { type: type === 'tv' ? 'tv' : 'movie', id: id, season: season ? parseInt(season) : 1, episode: episode ? parseInt(episode) : 1 };
    }

    async function fetchMediaDetails() {
        const { type, id } = currentMedia;
        const url = type === 'movie' 
            ? `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`
            : `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            mediaDetails = data;
            if (currentMedia.type === 'tv' && data.seasons) {
                seasonList = data.seasons.filter(s => s.season_number > 0).map(s => ({ season_number: s.season_number, episode_count: s.episode_count }));
                if (seasonList.length) {
                    if (!currentMedia.season || !seasonList.find(s => s.season_number === currentMedia.season)) 
                        currentMedia.season = seasonList[0].season_number;
                    if (!currentMedia.episode) currentMedia.episode = 1;
                }
            }
            return data;
        } catch { showToast('⚠️ Failed to load details'); return null; }
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    function renderHeroBanner(details) {
        const isMovie = currentMedia.type === 'movie';
        const title = isMovie ? details.title : details.name;
        const backdrop = details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : '';
        const poster = details.poster_path ? `https://image.tmdb.org/t/p/w300${details.poster_path}` : '';
        const rating = (details.vote_average / 2).toFixed(1);
        const year = isMovie ? (details.release_date?.substring(0,4) || '—') : (details.first_air_date?.substring(0,4) || '—');
        const genres = details.genres?.map(g => g.name).slice(0,3) || [];
        const overview = details.overview || 'Experience the best streaming quality with ad protection.';
        const trailerObj = details.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        trailerKey = trailerObj ? trailerObj.key : null;
        const bannerDiv = document.getElementById('heroBanner');
        if (backdrop) bannerDiv.style.backgroundImage = `url(${backdrop})`;
        else bannerDiv.style.backgroundColor = '#0a0a0f';
        
        document.getElementById('heroDetails').innerHTML = `
            <img class="hero-poster" src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
            <div class="hero-info">
                <h1>${escapeHtml(title)}</h1>
                <div class="hero-meta"><span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span><span class="hero-year">${year}</span>${!isMovie ? `<span>S${currentMedia.season || 1}</span>` : ''}</div>
                <div class="hero-genres">${genres.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>
                <p class="hero-overview">${escapeHtml(overview)}</p>
                <div class="action-buttons"><button class="btn-primary" id="watchMovieBtn"><i class="fa-solid fa-play"></i> Watch Now</button>
                <button class="btn-secondary" id="watchTrailerBtn" ${!trailerKey ? 'disabled style="opacity:0.5;"' : ''}><i class="fa-brands fa-youtube"></i> Trailer</button></div>
            </div>
        `;
        document.getElementById('watchMovieBtn').addEventListener('click', revealAndLoadPlayer);
        if (trailerKey) document.getElementById('watchTrailerBtn').addEventListener('click', () => openTrailerModal());
    }

    function revealAndLoadPlayer() {
        const hero = document.getElementById('heroBanner');
        hero.classList.add('hidden');
        const ps = document.getElementById('playerSection');
        if (!ps.classList.contains('visible')) {
            ps.classList.add('visible');
            ps.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        loadPlayer();
        // Show episode controls if TV
        if (currentMedia.type === 'tv') setupEpisodeControls();
    }

    function setupEpisodeControls() {
        const controlsDiv = document.getElementById('episodeControls');
        if (!controlsDiv) return;
        if (currentMedia.type !== 'tv' || !seasonList.length) {
            controlsDiv.style.display = 'none';
            return;
        }
        controlsDiv.style.display = 'flex';
        const seasonSelect = document.getElementById('seasonSelect');
        const episodeSelect = document.getElementById('episodeSelect');
        seasonSelect.innerHTML = '';
        seasonList.forEach(season => {
            const option = document.createElement('option');
            option.value = season.season_number;
            option.textContent = `Season ${season.season_number}`;
            if (season.season_number === currentMedia.season) option.selected = true;
            seasonSelect.appendChild(option);
        });
        function updateEpisodes() {
            const selectedSeason = parseInt(seasonSelect.value);
            const seasonObj = seasonList.find(s => s.season_number === selectedSeason);
            const maxEp = seasonObj ? seasonObj.episode_count : 10;
            episodeSelect.innerHTML = '';
            for (let i = 1; i <= maxEp; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = `Episode ${i}`;
                if (currentMedia.episode === i && selectedSeason === currentMedia.season) opt.selected = true;
                episodeSelect.appendChild(opt);
            }
        }
        updateEpisodes();
        seasonSelect.onchange = () => {
            currentMedia.season = parseInt(seasonSelect.value);
            currentMedia.episode = 1;
            updateEpisodes();
            if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer();
        };
        episodeSelect.onchange = () => {
            currentMedia.episode = parseInt(episodeSelect.value);
            if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer();
        };
    }

    async function loadPlayer() {
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<div class="loader"><div class="spinner" style="border: 3px solid #333; border-top: 3px solid #e50914; width: 40px; height: 40px; border-radius: 50%; margin: 40px auto; animation: spin 1s linear infinite;"></div></div>`;
        const server = SERVER_LIST.find(s => s.id === currentServerId);
        if (!server) { container.innerHTML = '<div style="color:#f87171; text-align:center;">Server error</div>'; return; }
        try {
            if (server.isAsync) {
                const { type, id, season, episode } = currentMedia;
                let playerUrl = `player.html?type=${type}&id=${id}&api=${server.apiVersion}`;
                if (type === 'tv') playerUrl += `&season=${season || 1}&episode=${episode || 1}`;
                container.innerHTML = `<iframe src="${playerUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0" referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
                document.getElementById('streamInfo').innerHTML = `🎥 Streaming via ${server.label} (ad-free optimized)`;
            } else {
                let embedUrl = currentMedia.type === 'movie' ? server.getUrl('movie', currentMedia.id) : server.getUrl('tv', currentMedia.id, currentMedia.season || 1, currentMedia.episode || 1);
                container.innerHTML = `<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0" referrerpolicy="no-referrer-when-downgrade" loading="lazy"></iframe>`;
                document.getElementById('streamInfo').innerHTML = `🎥 Streaming via ${server.label} | Ad shield active (popups/elements blocked)`;
            }
        } catch(err) { container.innerHTML = `<div style="color:#f87171; text-align:center;">Failed: ${err.message}</div>`; }
    }

    function renderServerButtons() {
        const cont = document.getElementById('serverList');
        cont.innerHTML = '';
        SERVER_LIST.forEach(srv => {
            const btn = document.createElement('button');
            btn.textContent = srv.label;
            btn.classList.add('server-btn');
            if (srv.id === currentServerId) btn.classList.add('active');
            btn.onclick = () => { currentServerId = srv.id; renderServerButtons(); if(document.getElementById('playerSection').classList.contains('visible')) loadPlayer(); showToast(`Switched to ${srv.label}`); };
            cont.appendChild(btn);
        });
    }

    function openTrailerModal() { if(!trailerKey) return; const modal = document.getElementById('trailerModal'); document.getElementById('trailerFrameContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1" allowfullscreen></iframe>`; modal.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeTrailerModal() { const modal = document.getElementById('trailerModal'); modal.classList.remove('active'); document.getElementById('trailerFrameContainer').innerHTML = ''; document.body.style.overflow = ''; }

    async function loadRecommendations() {
        const { type, id } = currentMedia;
        const url = type === 'movie' ? `https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}&page=1` : `https://api.themoviedb.org/3/tv/${id}/recommendations?api_key=${API_KEY}&page=1`;
        try {
            const res = await fetch(url); const data = await res.json(); const results = data.results?.slice(0,12) || [];
            if(results.length === 0) { document.getElementById('recommendSection').style.display = 'none'; return; }
            const row = document.getElementById('recRow'); row.innerHTML = '';
            results.forEach(item => {
                const card = document.createElement('div'); card.className = 'rec-card';
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : '';
                card.style.backgroundImage = `url(${poster})`; const title = item.title || item.name;
                card.innerHTML = `<div class="rec-title">${escapeHtml(title)}</div>`;
                card.onclick = () => { const newType = item.title ? 'movie' : 'tv'; window.location.href = `watch.html?type=${newType}&id=${item.id}`; };
                row.appendChild(card);
            });
            document.getElementById('recommendSection').style.display = 'block';
        } catch { document.getElementById('recommendSection').style.display = 'none'; }
    }

    function showToast(msg) { let t = document.querySelector('.toast'); if(t) t.remove(); t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

    // Mobile menu
    const menuToggle = document.getElementById('menuToggle'), mobileMenu = document.getElementById('mobileMenu'), overlay = document.getElementById('overlay'), closeMenuBtn = document.getElementById('closeMenuBtn');
    function openMenu() { mobileMenu.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
    function closeMenu() { mobileMenu.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }
    menuToggle?.addEventListener('click', openMenu); closeMenuBtn?.addEventListener('click', closeMenu); overlay?.addEventListener('click', closeMenu);
    window.addEventListener('scroll', () => { const navbar = document.getElementById('navbar'); if(window.scrollY > 50) navbar.classList.add('scrolled'); else navbar.classList.remove('scrolled'); });
    document.getElementById('closeModalBtn')?.addEventListener('click', closeTrailerModal);
    window.addEventListener('click', (e) => { if(e.target === document.getElementById('trailerModal')) closeTrailerModal(); });
    document.getElementById('showInfoBtn')?.addEventListener('click', () => {
        const hero = document.getElementById('heroBanner');
        if (hero.classList.contains('hidden')) {
            hero.classList.remove('hidden');
            hero.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            hero.classList.add('hidden');
        }
    });

    async function init() { parseURL(); const details = await fetchMediaDetails(); if(details) { renderHeroBanner(details); renderServerButtons(); await loadRecommendations(); if(currentMedia.type === 'tv') setupEpisodeControls(); } else document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">Failed to load media</div>'; }
    init();
</script>
</body>
</html>
