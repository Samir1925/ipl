<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>StreamHub — Watch Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: 0.3s;
        }
        .navbar.scrolled {
            background: #0a0a0f;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #e50914, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-icon i {
            color: #e50914;
        }
        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
        }
        .nav-links li {
            cursor: pointer;
            font-weight: 500;
        }
        .nav-links li:hover {
            color: #e50914;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: #e50914;
        }
        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.6rem;
            cursor: pointer;
        }
        /* Mobile menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: #0f0f1a;
            z-index: 1100;
            padding: 2rem 1.5rem;
            transition: 0.3s;
        }
        .mobile-menu.open {
            right: 0;
        }
        .close-menu {
            background: none;
            border: none;
            color: white;
            font-size: 1.6rem;
            float: right;
            cursor: pointer;
        }
        .nav-item {
            padding: 1rem 0;
            font-size: 1.2rem;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1050;
            display: none;
        }
        .overlay.active {
            display: block;
        }
        /* Hero */
        .hero-banner {
            margin-top: 70px;
            min-height: 500px;
            background-size: cover;
            background-position: center 30%;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2rem 3rem;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0a0a0f 0%, transparent 90%);
        }
        .hero-details {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }
        .hero-poster {
            width: 220px;
            border-radius: 16px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        .hero-info {
            flex: 1;
        }
        .hero-info h1 {
            font-size: 2.8rem;
            font-weight: 800;
        }
        .hero-meta {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0;
        }
        .hero-rating {
            background: #f5c518;
            color: #000;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: bold;
        }
        .hero-genres {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .genre-badge {
            background: rgba(255,255,255,0.15);
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .hero-overview {
            line-height: 1.5;
            max-width: 600px;
            margin-bottom: 1.5rem;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn-primary, .btn-secondary {
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        .btn-primary {
            background: #e50914;
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        /* Player — zero margins, zero border radius on mobile */
        .player-section {
            margin: 2rem 2rem 1rem 2rem;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }
        .player-section.visible {
            display: block;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .server-bar {
            background: #111;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }
        .server-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .server-btn {
            background: #1f1f2a;
            border: none;
            color: #eee;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .server-btn.active {
            background: #e50914;
            color: white;
        }
        .info-note {
            font-size: 0.8rem;
            color: #aaa;
        }
        /* Recommendations */
        .recommendations {
            margin: 2rem;
        }
        .rec-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .rec-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }
        .rec-card {
            min-width: 140px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            padding: 0.5rem;
            cursor: pointer;
        }
        .rec-title {
            background: linear-gradient(0deg, #000 0%, transparent);
            width: 100%;
            padding: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
        }
        /* Trailer Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }
        .modal-content {
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16/9;
        }
        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1f2a;
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 40px;
            z-index: 3000;
            border-left: 4px solid #e50914;
        }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: #000;
        }
        .spinner {
            border: 3px solid #222;
            border-top: 3px solid #e50914;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* MOBILE: remove all margins, border-radius, edge-to-edge player */
        @media (max-width: 768px) {
            .navbar {
                padding: 0.8rem 1rem;
            }
            .nav-links {
                display: none;
            }
            .menu-btn {
                display: block;
            }
            .hero-banner {
                padding: 1rem;
                margin-top: 65px;
                min-height: auto;
            }
            .hero-details {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .hero-poster {
                width: 160px;
            }
            .hero-info h1 {
                font-size: 1.8rem;
            }
            .player-section {
                margin: 0;
                border-radius: 0;
            }
            .player-wrapper {
                aspect-ratio: 16/9;
            }
            .player-wrapper iframe {
                border-radius: 0;
            }
            .server-bar {
                flex-direction: column;
                align-items: stretch;
                border-radius: 0;
            }
            .recommendations {
                margin: 1rem;
            }
            .back-btn span {
                display: none;
            }
            .back-btn {
                padding: 0.5rem 0.8rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="nav-left">
        <a href="#" class="logo" onclick="location.reload();return false;">
            <span class="logo-icon"><i class="fa-solid fa-play"></i></span>
            <span class="logo-text">STREAMHUB</span>
        </a>
        <ul class="nav-links">
            <li onclick="location.reload()">Home</li>
            <li onclick="location.href='#movies'">Movies</li>
            <li onclick="location.href='#series'">Series</li>
        </ul>
    </div>
    <div class="nav-right">
        <button class="menu-btn" id="menuToggle"><i class="fa-solid fa-bars"></i></button>
        <a href="#" class="back-btn" onclick="history.back();return false;"><i class="fa-solid fa-arrow-left"></i> <span>Back</span></a>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-menu" id="closeMenuBtn"><i class="fa-solid fa-times"></i></button>
    <div class="nav-item" onclick="location.reload()">Home</div>
    <div class="nav-item" onclick="location.href='#movies'">Movies</div>
    <div class="nav-item" onclick="location.href='#series'">Series</div>
</div>
<div class="overlay" id="overlay"></div>

<div id="heroBanner" class="hero-banner">
    <div id="heroDetails" class="hero-details"></div>
</div>

<div id="playerSection" class="player-section">
    <div class="player-wrapper" id="playerContainer">
        <div class="loader"><div class="spinner"></div></div>
    </div>
    <div class="server-bar">
        <div class="server-selector" id="serverList"></div>
        <div class="info-note" id="streamInfo">🎬 Select a server (popups blocked)</div>
    </div>
</div>

<div class="recommendations" id="recommendSection" style="display: none;">
    <div class="rec-header"><h3><i class="fa-solid fa-film"></i> More Like This</h3></div>
    <div class="rec-row" id="recRow"></div>
</div>

<div id="trailerModal" class="modal">
    <div class="close-modal" id="closeModalBtn"><i class="fa-solid fa-times"></i></div>
    <div class="modal-content" id="trailerFrameContainer"></div>
</div>

<script>
    // ---------- CONFIG ----------
    // Use a free, reliable TMDB API key (public demo key - works but rate limited)
    const API_KEY = "e7f6bfe957eaa0d78540e0f5cecbb90b";
    let currentMedia = { type: "movie", id: "550", season: 1, episode: 1 }; // default Fight Club
    let mediaDetails = null;
    let currentServerId = "server1";
    let trailerKey = null;

    // ---------- DIRECT EMBED SERVERS (verified working as of 2025) ----------
    const SERVER_LIST = [
        { id: "server1", label: "🎬 Server 1 (VidSrc)", getUrl: (type, id, s, e) => type === "movie" ? `https://vidsrc.net/embed/movie/${id}` : `https://vidsrc.net/embed/tv/${id}/${s}/${e}` },
        { id: "server2", label: "🎥 Server 2 (VidSrc.to)", getUrl: (type, id, s, e) => type === "movie" ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
        { id: "server3", label: "📺 Server 3 (2Embed)", getUrl: (type, id, s, e) => type === "movie" ? `https://2embed.cc/embed/movie/${id}` : `https://2embed.cc/embed/tv/${id}/${s}/${e}` },
        { id: "server4", label: "🔗 Server 4 (VidLink)", getUrl: (type, id, s, e) => type === "movie" ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${s}/${e}` }
    ];

    // ---------- AGGRESSIVE AD BLOCKER (popups, overlays, injected ads) ----------
    function initAdBlocker() {
        // Kill window.open
        window.open = function() { return null; };
        // Block ad links
        document.addEventListener('click', (e) => {
            let a = e.target.closest('a');
            if (a && (a.href.includes('exoclick') || a.href.includes('doubleclick') || a.href.includes('popunder'))) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }, true);
        // Remove ad elements
        const removeAds = () => {
            const selectors = ['[class*="ad-"]', '[id*="ad-"]', '.adsbygoogle', 'iframe[src*="doubleclick"]', 'iframe[src*="exoclick"]', 'div[style*="position: fixed"][style*="z-index: 999"]'];
            selectors.forEach(sel => {
                document.querySelectorAll(sel).forEach(el => {
                    if (!el.closest('#trailerModal')) el.remove();
                });
            });
        };
        const observer = new MutationObserver(removeAds);
        observer.observe(document.body, { childList: true, subtree: true });
        removeAds();
        showToast("🛡️ Ad blocker active (popups disabled)");
    }

    // ---------- URL PARAMETERS ----------
    function parseURL() {
        const params = new URLSearchParams(window.location.search);
        let type = params.get('type');
        let id = params.get('id');
        let season = params.get('season');
        let episode = params.get('episode');
        if (id) {
            currentMedia.type = type === 'tv' ? 'tv' : 'movie';
            currentMedia.id = id;
            if (season) currentMedia.season = parseInt(season);
            if (episode) currentMedia.episode = parseInt(episode);
        } else {
            // Default demo: Fight Club
            currentMedia = { type: "movie", id: "550", season: 1, episode: 1 };
            showToast("Demo: Fight Club (1999) — use ?type=movie&id=XXX");
        }
    }

    // ---------- FETCH TMDB DETAILS (with fallback mock) ----------
    async function fetchMediaDetails() {
        const { type, id } = currentMedia;
        const url = type === 'movie' 
            ? `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`
            : `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`TMDB error: ${res.status}`);
            return await res.json();
        } catch (err) {
            console.warn("TMDB fetch failed, using mock data", err);
            // Mock data for Fight Club (id 550)
            if (id === "550") {
                return {
                    title: "Fight Club",
                    name: "Fight Club",
                    backdrop_path: "/8uO0gUM8aNqYLs1OsTBQiXu0fEv.jpg",
                    poster_path: "/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg",
                    vote_average: 8.4,
                    release_date: "1999-10-15",
                    genres: [{ name: "Drama" }, { name: "Thriller" }],
                    overview: "A depressed man meets a soap salesman, and together they form an underground fight club.",
                    videos: { results: [] }
                };
            }
            return null;
        }
    }

    function renderHeroBanner(details) {
        if (!details) {
            document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">Failed to load content</div>';
            return;
        }
        const isMovie = currentMedia.type === 'movie';
        const title = isMovie ? details.title : details.name;
        const backdrop = details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : '';
        const poster = details.poster_path ? `https://image.tmdb.org/t/p/w300${details.poster_path}` : '';
        const rating = (details.vote_average / 2).toFixed(1);
        const year = isMovie ? (details.release_date?.substring(0,4) || '—') : (details.first_air_date?.substring(0,4) || '—');
        const genres = details.genres?.map(g => g.name).slice(0,3) || [];
        const overview = details.overview || 'No description available.';
        const trailer = details.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        trailerKey = trailer ? trailer.key : null;

        const heroDiv = document.getElementById('heroBanner');
        if (backdrop) heroDiv.style.backgroundImage = `url(${backdrop})`;
        else heroDiv.style.backgroundColor = '#0a0a0f';

        document.getElementById('heroDetails').innerHTML = `
            <img class="hero-poster" src="${poster}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
            <div class="hero-info">
                <h1>${escapeHtml(title)}</h1>
                <div class="hero-meta">
                    <span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
                    <span class="hero-year">${year}</span>
                </div>
                <div class="hero-genres">${genres.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>
                <p class="hero-overview">${escapeHtml(overview)}</p>
                <div class="action-buttons">
                    <button class="btn-primary" id="watchMovieBtn"><i class="fa-solid fa-play"></i> Watch Now</button>
                    <button class="btn-secondary" id="watchTrailerBtn" ${!trailerKey ? 'disabled style="opacity:0.5;"' : ''}><i class="fa-brands fa-youtube"></i> Trailer</button>
                </div>
            </div>
        `;
        document.getElementById('watchMovieBtn').addEventListener('click', revealAndLoadPlayer);
        if (trailerKey) document.getElementById('watchTrailerBtn').addEventListener('click', openTrailerModal);
    }

    function revealAndLoadPlayer() {
        const section = document.getElementById('playerSection');
        if (!section.classList.contains('visible')) {
            section.classList.add('visible');
            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        loadPlayer();
    }

    function loadPlayer() {
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
        const server = SERVER_LIST.find(s => s.id === currentServerId);
        if (!server) {
            container.innerHTML = '<div style="color:#f87171; text-align:center; padding:40px;">Server not found</div>';
            return;
        }
        let embedUrl;
        try {
            if (currentMedia.type === 'movie') {
                embedUrl = server.getUrl('movie', currentMedia.id, null, null);
            } else {
                embedUrl = server.getUrl('tv', currentMedia.id, currentMedia.season, currentMedia.episode);
            }
        } catch(e) {
            container.innerHTML = '<div style="color:#f87171; text-align:center; padding:40px;">Invalid server URL</div>';
            return;
        }
        // Load the iframe
        container.innerHTML = `<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0" referrerpolicy="no-referrer"></iframe>`;
        document.getElementById('streamInfo').innerHTML = `🎥 Streaming via ${server.label} (popups blocked)`;
    }

    function renderServerButtons() {
        const container = document.getElementById('serverList');
        container.innerHTML = '';
        SERVER_LIST.forEach(server => {
            const btn = document.createElement('button');
            btn.textContent = server.label;
            btn.classList.add('server-btn');
            if (server.id === currentServerId) btn.classList.add('active');
            btn.onclick = () => {
                currentServerId = server.id;
                renderServerButtons();
                if (document.getElementById('playerSection').classList.contains('visible')) loadPlayer();
                showToast(`Switched to ${server.label}`);
            };
            container.appendChild(btn);
        });
    }

    function openTrailerModal() {
        if (!trailerKey) return;
        const modal = document.getElementById('trailerModal');
        document.getElementById('trailerFrameContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1" allow="autoplay; fullscreen"></iframe>`;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeTrailerModal() {
        document.getElementById('trailerModal').classList.remove('active');
        document.getElementById('trailerFrameContainer').innerHTML = '';
        document.body.style.overflow = '';
    }

    async function loadRecommendations() {
        const { type, id } = currentMedia;
        const url = type === 'movie'
            ? `https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`
            : `https://api.themoviedb.org/3/tv/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const results = data.results?.slice(0, 12) || [];
            if (!results.length) {
                document.getElementById('recommendSection').style.display = 'none';
                return;
            }
            const row = document.getElementById('recRow');
            row.innerHTML = '';
            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : '';
                card.style.backgroundImage = `url(${poster})`;
                card.innerHTML = `<div class="rec-title">${escapeHtml(item.title || item.name)}</div>`;
                card.onclick = () => {
                    const newType = item.title ? 'movie' : 'tv';
                    window.location.href = `?type=${newType}&id=${item.id}`;
                };
                row.appendChild(card);
            });
            document.getElementById('recommendSection').style.display = 'block';
        } catch {
            document.getElementById('recommendSection').style.display = 'none';
        }
    }

    function escapeHtml(str) { return (str || '').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function showToast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // Mobile menu
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlayDiv = document.getElementById('overlay');
    const closeMenu = () => { mobileMenu.classList.remove('open'); overlayDiv.classList.remove('active'); document.body.style.overflow = ''; };
    const openMenu = () => { mobileMenu.classList.add('open'); overlayDiv.classList.add('active'); document.body.style.overflow = 'hidden'; };
    menuToggle?.addEventListener('click', openMenu);
    document.getElementById('closeMenuBtn')?.addEventListener('click', closeMenu);
    overlayDiv?.addEventListener('click', closeMenu);

    // INIT
    (async function() {
        initAdBlocker();
        parseURL();
        const details = await fetchMediaDetails();
        if (details) {
            mediaDetails = details;
            renderHeroBanner(details);
        } else {
            document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">⚠️ Failed to load media info. Check your internet or try another ID.</div>';
        }
        renderServerButtons();
        await loadRecommendations();
        document.getElementById('closeModalBtn').addEventListener('click', closeTrailerModal);
        window.addEventListener('click', (e) => { if (e.target === document.getElementById('trailerModal')) closeTrailerModal(); });
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) document.getElementById('navbar').classList.add('scrolled');
            else document.getElementById('navbar').classList.remove('scrolled');
        });
    })();
</script>
</body>
</html>
