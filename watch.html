<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>StreamHub — Watch Now</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
       <link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="logo">
            <span class="logo-icon"><i class="fa-solid fa-play"></i></span>
            <span class="logo-text">SAMFLIX</span>
        </a>
        <ul class="nav-links">
            <li onclick="location.href='index.html'">Home</li>
            <li onclick="location.href='index.html#movies'">Movies</li>
            <li onclick="location.href='index.html#series'">Series</li>
            <li onclick="location.href='index.html#popular'">New & Popular</li>
        </ul>
    </div>
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Browse</a>
</nav>

<div id="heroBanner" class="hero-banner" style="background-image: none;">
    <div class="hero-details" id="heroDetails"></div>
</div>

<div id="playerSection" class="player-section">
    <div class="player-wrapper" id="playerContainer">
        <div class="loader"><div class="spinner"></div></div>
    </div>
    <div class="server-bar">
        <div class="server-selector" id="serverList"></div>
        <div class="info-note" id="streamInfo">✨ Select a server to start streaming</div>
    </div>
</div>

<div class="recommendations" id="recommendSection" style="display: none;">
    <div class="rec-header">
        <h3><i class="fa-solid fa-film"></i> More Like This</h3>
        <span style="font-size:12px; color:var(--accent);">↓ swipe →</span>
    </div>
    <div class="rec-row" id="recRow"></div>
</div>

<div id="trailerModal" class="modal">
    <div class="close-modal" id="closeModalBtn"><i class="fa-solid fa-times"></i></div>
    <div class="modal-content" id="trailerFrameContainer"></div>
</div>

<script>
    const API_KEY = "e7f6bfe957eaa0d78540e0f5cecbb90b";
    let currentMedia = { type: "movie", id: null, season: null, episode: null };
    let mediaDetails = null;
    let currentServerId = "api2"; // default to Multi Language (first in list)
    let trailerKey = null;

    // ---------- SERVER LIST (API servers first, then all direct) ----------
    const SERVER_LIST = [
        // vidsrc.wtf API servers (async, use player.html)
        { id: "api2", label: "🌐 Multi Language", isAsync: true, apiVersion: 2 },
        { id: "api1", label: "💎 Premium", isAsync: true, apiVersion: 1 },
        // Direct embed servers
        { id: "vidsrcto", label: "VidSrc", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://vidsrc.mov/embed/movie/${id}` : `https://vidsrc.mov/embed/tv/${id}/${s}/${e}` },
        { id: "vidzee", label: "VidZee", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://player.vidzee.wtf/embed/movie/${id}` : `https://player.vidzee.wtf/embed/tv/${id}/${s}/${e}` },
        { id: "vidrock", label: "VidRock", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://vidrock.net/movie/${id}` : `https://vidrock.net/tv/${id}/${s}/${e}` },
        { id: "riveembed", label: "RiveEmbed", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://riveembed.com/embed/movie/${id}` : `https://riveembed.com/embed/tv/${id}/${s}/${e}` },
        { id: "vidlink", label: "VidLink", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${s}/${e}` },
        { id: "embedsu", label: "Embed.su", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://embed.su/embed/movie/${id}` : `https://embed.su/embed/tv/${id}/${s}/${e}` },
        { id: "2embed", label: "2Embed", isAsync: false, getUrl: (type, id, s, e) => type === "movie" ? `https://2embed.cc/embed/movie/${id}` : `https://2embed.cc/embed/tv/${id}/${s}/${e}` }
    ];

    // Ad blocker & cleanup
    function initAdBlocker() {
        const style = document.createElement('style');
        style.textContent = `
            iframe[src*="adserver"], .ads, .ad, [class*="ad-"] { display: none !important; }
            body > div[style*="position: fixed"]:not(#trailerModal):not(.toast) { display: none !important; }
        `;
        document.head.appendChild(style);
        new MutationObserver(() => {
            document.querySelectorAll('iframe, div').forEach(el => {
                if ((el.src && el.src.includes('adserver')) || 
                    (el.className && el.className.includes('ad'))) el.remove();
            });
        }).observe(document.body, { childList: true, subtree: true });
    }

    // Parse URL parameters
    function parseURL() {
        const params = new URLSearchParams(window.location.search);
        let type = params.get('type');
        let id = params.get('id');
        let season = params.get('season');
        let episode = params.get('episode');
        if (!id) {
            id = '550'; // Fallback demo
            type = 'movie';
            showToast('No ID provided, showing demo movie');
        }
        currentMedia = { type: type === 'tv' ? 'tv' : 'movie', id: id, season: season ? parseInt(season) : 1, episode: episode ? parseInt(episode) : 1 };
    }

    // Fetch TMDB details
    async function fetchMediaDetails() {
        const { type, id } = currentMedia;
        const url = type === 'movie' 
            ? `https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`
            : `https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=en-US&append_to_response=videos,recommendations`;
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error();
            const data = await res.json();
            mediaDetails = data;
            return data;
        } catch (err) {
            showToast('❌ Could not load media details');
            return null;
        }
    }

    // Render hero banner with movie info and buttons
    function renderHeroBanner(details) {
        const isMovie = currentMedia.type === 'movie';
        const title = isMovie ? details.title : details.name;
        const backdrop = details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : '';
        const poster = details.poster_path ? `https://image.tmdb.org/t/p/w300${details.poster_path}` : '';
        const rating = (details.vote_average / 2).toFixed(1);
        const year = isMovie ? (details.release_date?.substring(0,4) || '—') : (details.first_air_date?.substring(0,4) || '—');
        const genres = details.genres?.map(g => g.name).slice(0,3) || [];
        const overview = details.overview || 'No description available.';
        const trailerObj = details.videos?.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
        trailerKey = trailerObj ? trailerObj.key : null;

        document.getElementById('heroBanner').style.backgroundImage = backdrop ? `url(${backdrop})` : '';
        document.getElementById('heroBanner').style.backgroundColor = '#0a0a0f';
        
        const heroHtml = `
            <img class="hero-poster" src="${poster}" alt="${title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
            <div class="hero-info">
                <h1>${escapeHtml(title)}</h1>
                <div class="hero-meta">
                    <span class="hero-rating"><i class="fa-solid fa-star"></i> ${rating}</span>
                    <span class="hero-year">${year}</span>
                    ${!isMovie ? `<span>S${currentMedia.season || 1}</span>` : ''}
                </div>
                <div class="hero-genres">${genres.map(g => `<span class="genre-badge">${escapeHtml(g)}</span>`).join('')}</div>
                <p class="hero-overview">${escapeHtml(overview)}</p>
                <div class="action-buttons">
                    <button class="btn-primary" id="watchMovieBtn"><i class="fa-solid fa-play"></i> Watch Movie</button>
                    <button class="btn-secondary" id="watchTrailerBtn" ${!trailerKey ? 'disabled style="opacity:0.5;"' : ''}><i class="fa-brands fa-youtube"></i> Watch Trailer</button>
                </div>
            </div>
        `;
        document.getElementById('heroDetails').innerHTML = heroHtml;
        document.getElementById('watchMovieBtn').addEventListener('click', revealAndLoadPlayer);
        if (trailerKey) document.getElementById('watchTrailerBtn').addEventListener('click', openTrailerModal);
    }

    // Reveal player section and load video
    function revealAndLoadPlayer() {
        const playerSection = document.getElementById('playerSection');
        if (!playerSection.classList.contains('visible')) {
            playerSection.classList.add('visible');
            playerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        loadPlayer();
    }

    // Unified player loader: for async servers -> player.html, for direct -> embed URL
    async function loadPlayer() {
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
        const server = SERVER_LIST.find(s => s.id === currentServerId);
        if (!server) {
            container.innerHTML = '<div style="color:#f87171; text-align:center; padding:40px;">⚠️ Server not found</div>';
            return;
        }

        try {
            if (server.isAsync) {
                // Use player.html to handle vidsrc.wtf API
                const { type, id, season, episode } = currentMedia;
                let playerUrl = `player.html?type=${type}&id=${id}&api=${server.apiVersion}`;
                if (type === 'tv') {
                    playerUrl += `&season=${season || 1}&episode=${episode || 1}`;
                }
                container.innerHTML = `<iframe src="${playerUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0 allowfullscreen 
        webkitallowfullscreen 
        mozallowfullscreen"></iframe>`;
                document.getElementById('streamInfo').innerHTML = `🎥 Streaming via ${server.label} (vidsrc.wtf API)`;
            } else {
                // Direct embed
                let embedUrl;
                if (currentMedia.type === 'movie') {
                    embedUrl = server.getUrl('movie', currentMedia.id, null, null);
                } else {
                    const s = currentMedia.season || 1;
                    const e = currentMedia.episode || 1;
                    embedUrl = server.getUrl('tv', currentMedia.id, s, e);
                }
                container.innerHTML = `<iframe src="${embedUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0" referrerpolicy="no-referrer-when-downgrade"></iframe>`;
                document.getElementById('streamInfo').innerHTML = `🎥 Streaming via ${server.label}`;
            }
        } catch (err) {
            container.innerHTML = `<div style="color:#f87171; text-align:center; padding:40px;">Failed to load: ${err.message}</div>`;
        }
    }

    // Render server buttons (API servers first as per array order)
    function renderServerButtons() {
        const container = document.getElementById('serverList');
        container.innerHTML = '';
        SERVER_LIST.forEach(server => {
            const btn = document.createElement('button');
            btn.textContent = server.label;
            btn.classList.add('server-btn');
            if (server.id === currentServerId) btn.classList.add('active');
            btn.onclick = () => {
                currentServerId = server.id;
                renderServerButtons();
                if (document.getElementById('playerSection').classList.contains('visible')) {
                    loadPlayer();
                }
                showToast(`Switched to ${server.label}`);
            };
            container.appendChild(btn);
        });
    }

    // Trailer modal functions
    function openTrailerModal() {
        if (!trailerKey) return;
        const modal = document.getElementById('trailerModal');
        const frameContainer = document.getElementById('trailerFrameContainer');
        frameContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerKey}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    function closeTrailerModal() {
        const modal = document.getElementById('trailerModal');
        const frameContainer = document.getElementById('trailerFrameContainer');
        modal.classList.remove('active');
        frameContainer.innerHTML = '';
        document.body.style.overflow = '';
    }

    // Load recommendations from TMDB
    async function loadRecommendations() {
        const { type, id } = currentMedia;
        const url = type === 'movie'
            ? `https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`
            : `https://api.themoviedb.org/3/tv/${id}/recommendations?api_key=${API_KEY}&language=en-US&page=1`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const results = data.results?.slice(0, 12) || [];
            if (results.length === 0) {
                document.getElementById('recommendSection').style.display = 'none';
                return;
            }
            const row = document.getElementById('recRow');
            row.innerHTML = '';
            results.forEach(item => {
                const card = document.createElement('div');
                card.className = 'rec-card';
                const poster = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : '';
                card.style.backgroundImage = `url(${poster})`;
                const title = item.title || item.name;
                card.innerHTML = `<div class="rec-title">${escapeHtml(title)}</div>`;
                card.onclick = () => {
                    const newType = item.title ? 'movie' : 'tv';
                    window.location.href = `watch.html?type=${newType}&id=${item.id}`;
                };
                row.appendChild(card);
            });
            document.getElementById('recommendSection').style.display = 'block';
        } catch (err) {
            document.getElementById('recommendSection').style.display = 'none';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function init() {
        initAdBlocker();
        parseURL();
        const details = await fetchMediaDetails();
        if (!details) {
            document.getElementById('heroBanner').innerHTML = '<div style="padding:100px;text-align:center;">Failed to load content</div>';
            return;
        }
        renderHeroBanner(details);
        renderServerButtons();
        await loadRecommendations();
        document.getElementById('closeModalBtn').addEventListener('click', closeTrailerModal);
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('trailerModal')) closeTrailerModal();
        });
    }
    init();
</script>
</body>
</html>
