<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cinebto Stream · Multi‑Server with Control Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      color: #eef2ff;
    }

    /* navbar simplified */
    .navbar {
      background: rgba(10, 12, 18, 0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e2b0ff, #8b5cf6, #4f46e5);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .badge {
      background: #1e293b;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #a5b4fc;
      margin-left: 0.75rem;
    }

    .container {
      max-width: 1400px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    /* video player */
    .player-wrapper {
      background: #000000;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.7);
      aspect-ratio: 16 / 9;
      width: 100%;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* control form - sleek card */
    .control-card {
      background: #0f121ecc;
      backdrop-filter: blur(8px);
      border: 1px solid #2a2f45;
      border-radius: 28px;
      padding: 1.3rem 1.8rem;
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      align-items: flex-end;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 130px;
    }

    .input-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #9ca3cf;
    }

    .input-group input, .input-group select {
      background: #0a0d18;
      border: 1px solid #2f3a60;
      border-radius: 40px;
      padding: 0.7rem 1rem;
      color: white;
      font-weight: 500;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.2s;
    }

    .input-group input:focus, .input-group select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 6px rgba(139, 92, 246, 0.4);
    }

    .load-btn {
      background: #7c3aed;
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 700;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      margin-left: auto;
      font-family: inherit;
    }

    .load-btn:hover {
      background: #9b5cff;
      transform: scale(0.97);
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.5);
    }

    /* server section (BELOW player + form) */
    .server-section {
      margin-top: 2rem;
      background: #0f1219;
      border-radius: 32px;
      padding: 1rem 1rem 1rem 1.4rem;
      border: 1px solid #24283e;
    }

    .server-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      gap: 0.6rem;
    }

    .server-header h4 {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.2px;
      background: #1e253b;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      display: inline-block;
    }

    .server-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      max-height: 130px;
      overflow-y: auto;
      padding: 0.3rem 0;
    }

    .server-btn {
      background: #11161f;
      border: 1px solid #2d374e;
      color: #cbd5e6;
      padding: 0.5rem 1.1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
    }

    .server-btn.active {
      background: #7c3aed;
      border-color: #a78bfa;
      color: white;
      box-shadow: 0 0 8px rgba(124, 58, 237, 0.6);
    }

    .server-btn:hover:not(.active) {
      background: #20273f;
      color: #eef2ff;
      border-color: #5b6e9e;
    }

    .info-panel {
      background: #0b0e16;
      border-radius: 20px;
      padding: 0.8rem 1.3rem;
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.8rem;
    }

    .content-meta {
      display: flex;
      gap: 1rem;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .active-server-badge {
      background: #1a1f2e;
      padding: 0.25rem 1rem;
      border-radius: 32px;
      font-weight: 600;
    }

    .note {
      color: #8892b0;
      font-size: 0.7rem;
    }

    .error-msg {
      background: #2c1a2e;
      border-left: 4px solid #f43f5e;
      padding: 0.8rem 1.2rem;
      border-radius: 1rem;
      margin-top: 1rem;
      font-size: 0.85rem;
    }

    .loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      background: #05070c;
      gap: 0.8rem;
      flex-direction: column;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #2e3e60;
      border-top: 3px solid #a78bfa;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 780px) {
      .control-card { flex-direction: column; align-items: stretch; }
      .load-btn { margin-left: 0; margin-top: 0.5rem; }
      .server-selector { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 0.5rem; }
      .container { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div>
    <span class="logo">🎬 Cinebto · MultiStream</span>
    <span class="badge">⚡ 24+ SERVERS · FORM CONTROL</span>
  </div>
  <div class="note" style="font-size:0.7rem;">👇 Server list below player</div>
</div>

<div class="container">
  <!-- PLAYER REGION -->
  <div class="player-wrapper" id="playerContainer">
    <div class="loader">
      <div class="spinner"></div>
      <span>Ready to stream</span>
    </div>
  </div>

  <!-- CONTROL FORM: Media input & type selector -->
  <div class="control-card">
    <div class="input-group">
      <label>🎞️ Content Type</label>
      <select id="contentTypeSelect">
        <option value="movie">🎬 Movie</option>
        <option value="tv">📺 TV Series</option>
      </select>
    </div>
    <div class="input-group">
      <label>TMDB / IMDB ID</label>
      <input type="text" id="mediaIdInput" placeholder="e.g., 1247165, 1399" value="1247165">
    </div>
    <div class="input-group" id="seasonGroup">
      <label>Season</label>
      <input type="number" id="seasonInput" value="1" min="1">
    </div>
    <div class="input-group" id="episodeGroup">
      <label>Episode</label>
      <input type="number" id="episodeInput" value="1" min="1">
    </div>
    <button class="load-btn" id="loadContentBtn">▶ LOAD & STREAM</button>
  </div>

  <!-- SERVER SELECTOR (BELOW PLAYER & FORM) -->
  <div class="server-section">
    <div class="server-header">
      <h4>🌐 SELECT STREAMING SERVER</h4>
      <span class="note">✨ Click any server — embed updates instantly</span>
    </div>
    <div id="serverButtonsContainer" class="server-selector">
      <!-- dynamic server buttons injected -->
    </div>
    <div class="info-panel">
      <div class="content-meta">
        <span id="contentTypeBadge" class="active-server-badge">🎬 MOVIE</span>
        <span id="activeServerLabel" class="active-server-badge">⚡ Server: —</span>
        <span id="customNote" class="note">📌 Use form above to change content</span>
      </div>
      <select id="quickServerSelect" aria-label="quick server switch" style="background:#10131f; border-radius:2rem; padding:0.3rem 0.8rem; font-size:0.75rem;">
        <option value="">🔁 Quick jump</option>
      </select>
    </div>
  </div>
  <div id="errorZone"></div>
</div>

<script>
  // ------------------------------------------------------------------
  //  COMPLETE SERVER REGISTRY (24 servers, includes vidsrc.wtf APIs)
  // ------------------------------------------------------------------
  const SERVER_REGISTRY = [
    { id: "vidsrcto", label: "vidsrc.mov ⚡", needsAsync: false, movie: (id) => `https://vidsrc.mov/embed/movie/${id}`, tv: (id, s, e) => `https://vidsrc.mov/embed/tv/${id}/${s}/${e}` },
    { id: "vidzee", label: "Vidzee", needsAsync: false, movie: (id) => `https://player.vidzee.wtf/embed/movie/${id}`, tv: (id, s, e) => `https://player.vidzee.wtf/embed/tv/${id}/${s}/${e}` },
    { id: "vidrock", label: "VidRock", needsAsync: false, movie: (id) => `https://vidrock.net/movie/${id}`, tv: (id, s, e) => `https://vidrock.net/tv/${id}/${s}/${e}` },
    { id: "vidsrc-wtf-1", label: "VidSrc.WTF (v1)", needsAsync: true, apiVer: 1 },
    { id: "vidsrc-wtf-2", label: "VidSrc.WTF (v2)", needsAsync: true, apiVer: 2 },
    { id: "vidsrc-wtf-3", label: "VidSrc.WTF (v3)", needsAsync: true, apiVer: 3 },
    { id: "vidsrc-wtf-4", label: "VidSrc.WTF (v4)", needsAsync: true, apiVer: 4 },
    { id: "vidnest", label: "VidNest", needsAsync: false, movie: (id) => `https://vidnest.fun/movie/${id}`, tv: (id, s, e) => `https://vidnest.fun/tv/${id}/${s}/${e}` },
    { id: "riveembed", label: "RiveEmbed", needsAsync: false, movie: (id) => `https://riveembed.com/embed/movie/${id}`, tv: (id, s, e) => `https://riveembed.com/embed/tv/${id}/${s}/${e}` },
    { id: "smashystream", label: "SmashyStream", needsAsync: false, movie: (id) => `https://smashystream.com/embed/movie/${id}`, tv: (id, s, e) => `https://smashystream.com/embed/tv/${id}/${s}/${e}` },
    { id: "111movies", label: "111Movies", needsAsync: false, movie: (id) => `https://111movies.net/movie/${id}`, tv: (id, s, e) => `https://111movies.net/tv/${id}/${s}/${e}` },
    { id: "videasy", label: "Videasy", needsAsync: false, movie: (id) => `https://player.videasy.net/movie/${id}`, tv: (id, s, e) => `https://player.videasy.net/tv/${id}/${s}/${e}` },
    { id: "vidlink", label: "VidLink", needsAsync: false, movie: (id) => `https://vidlink.pro/movie/${id}`, tv: (id, s, e) => `https://vidlink.pro/tv/${id}/${s}/${e}` },
    { id: "vidfast", label: "VidFast", needsAsync: false, movie: (id) => `https://vidfast.pro/embed/movie/${id}`, tv: (id, s, e) => `https://vidfast.pro/embed/tv/${id}/${s}/${e}` },
    { id: "embedsu", label: "Embed.su", needsAsync: false, movie: (id) => `https://embed.su/embed/movie/${id}`, tv: (id, s, e) => `https://embed.su/embed/tv/${id}/${s}/${e}` },
    { id: "2embed", label: "2Embed", needsAsync: false, movie: (id) => `https://2embed.cc/embed/movie/${id}`, tv: (id, s, e) => `https://2embed.cc/embed/tv/${id}/${s}/${e}` },
    { id: "moviesapi", label: "MoviesAPI", needsAsync: false, movie: (id) => `https://moviesapi.club/movie/${id}`, tv: (id, s, e) => `https://moviesapi.club/tv/${id}/${s}/${e}` },
    { id: "autoembed", label: "AutoEmbed", needsAsync: false, movie: (id) => `https://autoembed.to/movie/${id}`, tv: (id, s, e) => `https://autoembed.to/tv/${id}/${s}/${e}` },
    { id: "multiembed", label: "MultiEmbed", needsAsync: false, movie: (id) => `https://multiembed.to/movie/${id}`, tv: (id, s, e) => `https://multiembed.to/tv/${id}/${s}/${e}` },
    { id: "vidsrc-xyz", label: "VidSrc.xyz", needsAsync: false, movie: (id) => `https://vidsrc.xyz/embed/movie/${id}`, tv: (id, s, e) => `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}` },
    { id: "primewire", label: "PrimeWire", needsAsync: false, movie: (id) => `https://primewire.tf/embed/movie/${id}`, tv: (id, s, e) => `https://primewire.tf/embed/tv/${id}/${s}/${e}` },
    { id: "warezcdn", label: "WarezCDN", needsAsync: false, movie: (id) => `https://warezcdn.com/movie/${id}`, tv: (id, s, e) => `https://warezcdn.com/tv/${id}/${s}/${e}` },
    { id: "superflix", label: "SuperFlix", needsAsync: false, movie: (id) => `https://superflix.net/movie/${id}`, tv: (id, s, e) => `https://superflix.net/tv/${id}/${s}/${e}` },
    { id: "vidup", label: "VidUp 🔥", needsAsync: false, movie: (id) => `https://vidup.io/embed/movie/${id}`, tv: (id, s, e) => `https://vidup.io/embed/tv/${id}/${s}/${e}` }
  ];

  // ---------- GLOBAL STATE ----------
  let currentType = "movie";
  let currentMediaId = "1247165";
  let currentSeason = 1;
  let currentEpisode = 1;
  let currentServerId = "vidsrcto";
  let isLoading = false;

  // DOM elements
  const playerContainer = document.getElementById("playerContainer");
  const errorZone = document.getElementById("errorZone");
  const contentTypeBadge = document.getElementById("contentTypeBadge");
  const activeServerLabel = document.getElementById("activeServerLabel");
  const customNoteSpan = document.getElementById("customNote");
  const serverBtnsContainer = document.getElementById("serverButtonsContainer");
  const quickSelect = document.getElementById("quickServerSelect");

  // Form inputs
  const contentTypeSelect = document.getElementById("contentTypeSelect");
  const mediaIdInput = document.getElementById("mediaIdInput");
  const seasonInput = document.getElementById("seasonInput");
  const episodeInput = document.getElementById("episodeInput");
  const seasonGroup = document.getElementById("seasonGroup");
  const episodeGroup = document.getElementById("episodeGroup");
  const loadBtn = document.getElementById("loadContentBtn");

  // Helper: toggle TV season/ep visibility
  function toggleTvInputs() {
    const isTv = contentTypeSelect.value === "tv";
    seasonGroup.style.display = isTv ? "flex" : "none";
    episodeGroup.style.display = isTv ? "flex" : "none";
  }
  contentTypeSelect.addEventListener("change", toggleTvInputs);
  toggleTvInputs();

  // Error display
  function showError(msg) { errorZone.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`; }
  function clearError() { errorZone.innerHTML = ""; }

  // Update UI after state change
  function refreshUIContentMeta() {
    contentTypeBadge.innerHTML = currentType === "movie" ? "🎬 MOVIE STREAM" : `📺 TV SERIES · S${currentSeason} E${currentEpisode}`;
    const currentSrv = SERVER_REGISTRY.find(s => s.id === currentServerId);
    activeServerLabel.innerHTML = `⚡ ${currentSrv?.label || currentServerId}`;
    customNoteSpan.innerHTML = currentType === "movie" ? `🎞️ ID: ${currentMediaId}` : `📺 ${currentMediaId} · S${currentSeason}/E${currentEpisode}`;
  }

  // Render iframe
  function renderIframe(src) {
    if (!src) throw new Error("Empty embed URL");
    const iframeHtml = `<iframe src="${src}" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
      allowfullscreen="true"
      referrerpolicy="strict-origin-when-cross-origin"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation allow-presentation"
      style="width:100%; height:100%; border:none;">
    </iframe>`;
    playerContainer.innerHTML = iframeHtml;
  }

  // Async fetch for vidsrc.wtf
  async function fetchAsyncEmbed(serverObj) {
    const apiVer = serverObj.apiVer;
    const baseApi = `https://vidsrc.wtf/api/${apiVer}`;
    let endpoint = "";
    if (currentType === "movie") {
      endpoint = `${baseApi}/movie/?id=${currentMediaId}&color=8B5CF6`;
    } else {
      endpoint = `${baseApi}/tv/?id=${currentMediaId}&s=${currentSeason}&e=${currentEpisode}&color=8B5CF6`;
    }
    const resp = await fetch(endpoint, { headers: { "Accept": "application/json" } });
    if (!resp.ok) throw new Error(`API ${apiVer} responded ${resp.status}`);
    const data = await resp.json();
    let extracted = null;
    if (data.iframe) extracted = data.iframe;
    else if (data.embed_url) extracted = data.embed_url;
    else if (data.url) extracted = data.url;
    else if (data.result?.url) extracted = data.result.url;
    else if (data.sources?.[0]?.file) extracted = data.sources[0].file;
    else if (typeof data === "string" && data.startsWith("http")) extracted = data;
    if (!extracted) throw new Error("No video source from API");
    if (!extracted.startsWith("http")) extracted = "https:" + extracted;
    return extracted;
  }

  // MAIN LOAD PLAYER (with current global state & server)
  async function loadPlayer() {
    if (isLoading) return;
    if (!currentMediaId) {
      showError("Media ID missing. Enter a valid TMDB ID (e.g., 1247165).");
      return;
    }
    clearError();
    isLoading = true;
    const server = SERVER_REGISTRY.find(s => s.id === currentServerId);
    if (!server) {
      showError(`Server config missing: ${currentServerId}`);
      isLoading = false;
      return;
    }
    refreshUIContentMeta();
    playerContainer.innerHTML = `<div class="loader"><div class="spinner"></div><span>Connecting to ${server.label} ...</span></div>`;

    try {
      let embedUrl = null;
      if (server.needsAsync && server.apiVer) {
        embedUrl = await fetchAsyncEmbed(server);
      } else {
        if (!server.movie || !server.tv) throw new Error("Invalid embed pattern");
        if (currentType === "movie") {
          embedUrl = server.movie(currentMediaId);
        } else {
          if (currentSeason == null || currentEpisode == null) throw new Error("Season/Episode required");
          embedUrl = server.tv(currentMediaId, currentSeason, currentEpisode);
        }
      }
      if (!embedUrl) throw new Error("Unable to generate embed source");
      renderIframe(embedUrl);
    } catch (err) {
      console.error(err);
      playerContainer.innerHTML = `<div style="background:#150e1a; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center;"><span>❌ Stream error</span><span style="font-size:13px; color:#c084fc;">${err.message}</span></div>`;
      showError(`${server.label} : ${err.message || "failed to load"}`);
    } finally {
      isLoading = false;
    }
  }

  // Sync state from form and reload content (update URL + player)
  function syncFromFormAndLoad() {
    currentType = contentTypeSelect.value;
    currentMediaId = mediaIdInput.value.trim();
    if (!currentMediaId) {
      showError("Please enter a valid ID (movie or TV show ID)");
      return;
    }
    if (currentType === "tv") {
      let s = parseInt(seasonInput.value, 10);
      let e = parseInt(episodeInput.value, 10);
      if (isNaN(s)) s = 1;
      if (isNaN(e)) e = 1;
      currentSeason = Math.max(1, s);
      currentEpisode = Math.max(1, e);
      seasonInput.value = currentSeason;
      episodeInput.value = currentEpisode;
    } else {
      currentSeason = null;
      currentEpisode = null;
    }
    // Update browser URL without full reload (nice to share)
    let newUrl = `/watch/${currentType}/${currentMediaId}`;
    if (currentType === "tv") newUrl += `/${currentSeason}/${currentEpisode}`;
    newUrl += `?server=${currentServerId}`;
    window.history.replaceState({}, "", newUrl);
    refreshUIContentMeta();
    loadPlayer();
  }

  // Server switching: change server & reload current content
  function setActiveServer(serverId) {
    if (currentServerId === serverId) return;
    currentServerId = serverId;
    // Update URL param with new server
    const url = new URL(window.location.href);
    url.searchParams.set("server", currentServerId);
    window.history.replaceState({}, "", url.toString());
    refreshUIContentMeta();
    // re-highlight buttons
    document.querySelectorAll(".server-btn").forEach(btn => {
      if (btn.dataset.id === currentServerId) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    if (quickSelect) quickSelect.value = currentServerId;
    loadPlayer();
  }

  // Build server UI (buttons + quick select) below player
  function buildServerUI() {
    serverBtnsContainer.innerHTML = "";
    quickSelect.innerHTML = '<option value="">🔽 Quick server</option>';
    SERVER_REGISTRY.forEach(server => {
      const btn = document.createElement("button");
      btn.className = "server-btn";
      if (server.id === currentServerId) btn.classList.add("active");
      btn.textContent = server.label;
      btn.dataset.id = server.id;
      btn.addEventListener("click", () => setActiveServer(server.id));
      serverBtnsContainer.appendChild(btn);
      
      const option = document.createElement("option");
      option.value = server.id;
      option.textContent = server.label;
      if (server.id === currentServerId) option.selected = true;
      quickSelect.appendChild(option);
    });
    quickSelect.addEventListener("change", (e) => {
      const newId = e.target.value;
      if (newId && newId !== currentServerId) setActiveServer(newId);
    });
  }

  // initial route parse (for shareable URLs)
  function parseRouteFromUrl() {
    const path = window.location.pathname;
    let match = path.match(/\/watch\/movie\/([^\/?#]+)/i);
    if (match) {
      currentType = "movie";
      currentMediaId = match[1];
      currentSeason = null;
      currentEpisode = null;
      contentTypeSelect.value = "movie";
      mediaIdInput.value = currentMediaId;
      toggleTvInputs();
      return true;
    }
    match = path.match(/\/watch\/tv\/([^\/?#]+)\/(\d+)\/(\d+)/i);
    if (match) {
      currentType = "tv";
      currentMediaId = match[1];
      currentSeason = parseInt(match[2], 10);
      currentEpisode = parseInt(match[3], 10);
      contentTypeSelect.value = "tv";
      mediaIdInput.value = currentMediaId;
      seasonInput.value = currentSeason;
      episodeInput.value = currentEpisode;
      toggleTvInputs();
      return true;
    }
    return false;
  }

  // get server from URL param
  function getServerFromUrlParam() {
    const sp = new URLSearchParams(window.location.search);
    const s = sp.get("server");
    if (s && SERVER_REGISTRY.some(serv => serv.id === s)) return s;
    return null;
  }

  // initial load
  function initApp() {
    const hasRoute = parseRouteFromUrl();
    if (!hasRoute) {
      // default demo
      currentType = "movie";
      currentMediaId = "1247165";
      currentSeason = null;
      currentEpisode = null;
      contentTypeSelect.value = "movie";
      mediaIdInput.value = "1247165";
      toggleTvInputs();
      const defaultUrl = `/watch/movie/1247165?server=${currentServerId}`;
      window.history.replaceState({}, "", defaultUrl);
    }
    const urlServer = getServerFromUrlParam();
    if (urlServer && SERVER_REGISTRY.some(s=>s.id===urlServer)) currentServerId = urlServer;
    else currentServerId = "vidsrcto";
    
    buildServerUI();
    refreshUIContentMeta();
    loadPlayer();
  }

  // Event listeners
  loadBtn.addEventListener("click", syncFromFormAndLoad);
  window.addEventListener("popstate", () => {
    const routeOk = parseRouteFromUrl();
    if (!routeOk) return;
    const srvParam = getServerFromUrlParam();
    if (srvParam && SERVER_REGISTRY.find(s=>s.id===srvParam)) currentServerId = srvParam;
    refreshUIContentMeta();
    // re-sync server buttons active state
    document.querySelectorAll(".server-btn").forEach(btn => {
      if (btn.dataset.id === currentServerId) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    if (quickSelect) quickSelect.value = currentServerId;
    loadPlayer();
  });

  initApp();
</script>
</body>
</html>
