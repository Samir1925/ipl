<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sam TV – Watch Movies & Shows</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #141414;
      font-family: 'Segoe UI', -apple-system, 'Netflix Sans', 'Helvetica Neue', Arial, sans-serif;
      color: #e5e5e5;
    }

    /* Netflix-style scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #2d2d2d;
    }
    ::-webkit-scrollbar-thumb {
      background: #e50914;
      border-radius: 4px;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
      backdrop-filter: blur(8px);
      padding: 0.8rem 3rem;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #e50914;
      text-decoration: none;
    }
    .logo span {
      background: #e50914;
      padding: 0.2rem 0.55rem;
      border-radius: 8px;
      font-size: 1.1rem;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .logo .logo-text {
      background: transparent;
      color: #e50914;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .nav-links a {
      color: #e5e5e5;
      text-decoration: none;
      transition: 0.2s;
    }
    .nav-links a:hover { color: #b3b3b3; }

    /* main container */
    .watch-container {
      padding-top: 70px;
    }

    /* category & title row */
    .title-row {
      padding: 1rem 3rem 0.5rem 3rem;
      background: linear-gradient(180deg, #141414 0%, #0a0a0a 100%);
    }
    .category-badge {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e50914;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }
    .movie-title {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* player section */
    .player-section {
      background: #000;
      position: relative;
      width: 100%;
      margin: 0.5rem 0 1rem 0;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    }
    .player-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* server list (horizontal scroll) */
    .server-section {
      padding: 1rem 3rem;
      background: #0a0a0a;
      border-top: 1px solid #2a2a2a;
      border-bottom: 1px solid #2a2a2a;
    }
    .server-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .server-header h4 {
      font-size: 1rem;
      font-weight: 600;
      color: #e5e5e5;
      letter-spacing: 0.5px;
    }
    .server-selector {
      display: flex;
      gap: 0.8rem;
      overflow-x: auto;
      padding-bottom: 0.6rem;
      scrollbar-width: thin;
    }
    .server-btn {
      background: #2a2a2a;
      border: none;
      color: #e5e5e5;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
    }
    .server-btn.active {
      background: #e50914;
      color: white;
      box-shadow: 0 0 8px rgba(229,9,20,0.5);
    }
    .server-btn:hover:not(.active) {
      background: #3a3a3a;
      transform: scale(0.97);
    }

    /* movie details: two-column layout (poster + info) */
    .details-section {
      padding: 2rem 3rem;
      background: #141414;
    }
    .details-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .poster-sm {
      flex-shrink: 0;
      width: 180px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .poster-sm img {
      width: 100%;
      height: auto;
      display: block;
    }
    .info-panel {
      flex: 1;
    }
    .info-panel h2 {
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0.8rem 0;
      font-size: 0.85rem;
      color: #a3a3a3;
    }
    .rating-badge {
      background: #e50914;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      color: white;
      font-weight: 600;
    }
    .overview {
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 1rem 0;
      color: #cccccc;
      max-width: 800px;
    }
    .cast-crew {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .cast-crew h4 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #e50914;
    }
    .cast-crew p {
      font-size: 0.8rem;
      color: #b3b3b3;
    }

    /* recommendations / you may also like */
    .similar-section {
      padding: 2rem 3rem 3rem 3rem;
      background: #0a0a0a;
      border-top: 1px solid #2a2a2a;
    }
    .similar-section h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.2rem;
      letter-spacing: -0.2px;
    }
    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    .similar-card {
      background: #1f1f1f;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .similar-card:hover {
      transform: scale(1.03);
    }
    .similar-card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
    }
    .similar-card .title {
      padding: 0.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      text-align: center;
    }
    .loader, .error-state {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      padding: 3rem;
      flex-direction: column;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a2a;
      border-top: 3px solid #e50914;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 780px) {
      .navbar { padding: 0.8rem 1.2rem; }
      .title-row, .server-section, .details-section, .similar-section { padding-left: 1.2rem; padding-right: 1.2rem; }
      .poster-sm { width: 120px; }
      .movie-title { font-size: 1.4rem; }
      .similar-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">
    <span>▶</span>
    <span class="logo-text">Sam tv</span>
  </div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">TV Shows</a>
    <a href="#">Movies</a>
    <a href="#">My List</a>
  </div>
</div>

<div class="watch-container">
  <!-- category & title row -->
  <div class="title-row">
    <div class="category-badge" id="categoryBadge">MOVIE</div>
    <div class="movie-title" id="movieTitle">Loading...</div>
  </div>

  <!-- player -->
  <div class="player-section">
    <div class="player-wrapper" id="playerContainer">
      <div class="loader"><div class="spinner"></div><span>Preparing stream...</span></div>
    </div>
  </div>

  <!-- server list (horizontal) -->
  <div class="server-section">
    <div class="server-header">
      <h4>🌐 SELECT STREAMING SERVER</h4>
      <span id="activeServerBadge" style="font-size:0.75rem; background:#2a2a2a; padding:0.2rem 0.8rem; border-radius:20px;">Active: —</span>
    </div>
    <div id="serverButtonsContainer" class="server-selector"></div>
  </div>

  <!-- movie details (poster + info) -->
  <div class="details-section" id="detailsSection">
    <div class="loader"><div class="spinner"></div><span>Loading movie details...</span></div>
  </div>

  <!-- recommendations -->
  <div class="similar-section" id="similarSection">
    <h3>📺 You May Also Like</h3>
    <div id="similarGrid" class="similar-grid">
      <div class="loader"><div class="spinner"></div><span>Loading...</span></div>
    </div>
  </div>
</div>

<script>
  // ==================== TMDB API (replace with your key) ====================
  const TMDB_API_KEY = "YOUR_TMDB_API_KEY";  // 🔴 REPLACE WITH YOUR OWN TMDB API KEY
  const TMDB_BASE = "https://api.themoviedb.org/3";
  const TMDB_IMG = "https://image.tmdb.org/t/p/original";
  const TMDB_POSTER = "https://image.tmdb.org/t/p/w342";

  // ==================== SERVER REGISTRY (no vidsrc.wtf) ====================
  const SERVER_REGISTRY = [
    { id: "vidzee", label: "Vidzee", movie: (id) => `https://player.vidzee.wtf/embed/movie/${id}` },
    { id: "vidrock", label: "VidRock", movie: (id) => `https://vidrock.net/movie/${id}` },
    { id: "vidnest", label: "VidNest", movie: (id) => `https://vidnest.fun/movie/${id}` },
    { id: "riveembed", label: "RiveEmbed", movie: (id) => `https://riveembed.com/embed/movie/${id}` },
    { id: "smashystream", label: "SmashyStream", movie: (id) => `https://smashystream.com/embed/movie/${id}` },
    { id: "111movies", label: "111Movies", movie: (id) => `https://111movies.net/movie/${id}` },
    { id: "videasy", label: "Videasy", movie: (id) => `https://player.videasy.net/movie/${id}` },
    { id: "vidlink", label: "VidLink", movie: (id) => `https://vidlink.pro/movie/${id}` },
    { id: "vidfast", label: "VidFast", movie: (id) => `https://vidfast.pro/embed/movie/${id}` },
    { id: "embedsu", label: "Embed.su", movie: (id) => `https://embed.su/embed/movie/${id}` },
    { id: "2embed", label: "2Embed", movie: (id) => `https://2embed.cc/embed/movie/${id}` },
    { id: "moviesapi", label: "MoviesAPI", movie: (id) => `https://moviesapi.club/movie/${id}` },
    { id: "autoembed", label: "AutoEmbed", movie: (id) => `https://autoembed.to/movie/${id}` },
    { id: "multiembed", label: "MultiEmbed", movie: (id) => `https://multiembed.to/movie/${id}` },
    { id: "primewire", label: "PrimeWire", movie: (id) => `https://primewire.tf/embed/movie/${id}` },
    { id: "warezcdn", label: "WarezCDN", movie: (id) => `https://warezcdn.com/movie/${id}` },
    { id: "superflix", label: "SuperFlix", movie: (id) => `https://superflix.net/movie/${id}` },
    { id: "vidup", label: "VidUp 🔥", movie: (id) => `https://vidup.io/embed/movie/${id}` },
    { id: "cinehub", label: "CineHub", movie: (id) => `https://cinehub.wtf/embed/movie/${id}` },
    { id: "moviestream", label: "MovieStream", movie: (id) => `https://moviestream.to/embed/movie/${id}` },
    { id: "flixhq", label: "FlixHQ", movie: (id) => `https://flixhq.to/embed/movie/${id}` }
  ];

  // ---------- GLOBAL ----------
  let currentMovieId = null;
  let currentServerId = SERVER_REGISTRY[0]?.id || "vidzee";
  let movieDataCache = null;
  let isLoading = false;

  // DOM elements
  const playerContainer = document.getElementById("playerContainer");
  const detailsSection = document.getElementById("detailsSection");
  const similarGrid = document.getElementById("similarGrid");
  const serverBtnsContainer = document.getElementById("serverButtonsContainer");
  const activeServerBadge = document.getElementById("activeServerBadge");
  const movieTitleEl = document.getElementById("movieTitle");
  const categoryBadge = document.getElementById("categoryBadge");

  // helper: get movie ID from URL (query param "id" or path /watch/123)
  function getMovieIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    let id = params.get("id");
    if (id) return id;
    const match = window.location.pathname.match(/\/watch\/(\d+)/);
    if (match) return match[1];
    return null;
  }

  // update URL with current movie & server
  function updateUrl() {
    if (!currentMovieId) return;
    const url = new URL(window.location.href);
    url.searchParams.set("id", currentMovieId);
    url.searchParams.set("server", currentServerId);
    window.history.replaceState({}, "", url.toString());
  }

  // fetch movie details + credits
  async function fetchMovieDetails(movieId) {
    const [detailsRes, creditsRes] = await Promise.all([
      fetch(`${TMDB_BASE}/movie/${movieId}?api_key=${TMDB_API_KEY}&language=en-US`),
      fetch(`${TMDB_BASE}/movie/${movieId}/credits?api_key=${TMDB_API_KEY}&language=en-US`)
    ]);
    if (!detailsRes.ok) throw new Error("Movie not found");
    const movie = await detailsRes.json();
    const credits = await creditsRes.json();
    return { movie, credits };
  }

  // fetch recommendations
  async function fetchRecommendations(movieId) {
    const res = await fetch(`${TMDB_BASE}/movie/${movieId}/recommendations?api_key=${TMDB_API_KEY}&language=en-US&page=1`);
    if (!res.ok) return [];
    const data = await res.json();
    return data.results.slice(0, 12);
  }

  // render movie details and credits (director + cast)
  function renderDetails(movie, credits) {
    const poster = movie.poster_path ? TMDB_POSTER + movie.poster_path : "https://via.placeholder.com/300x450?text=No+Poster";
    const year = new Date(movie.release_date).getFullYear() || "N/A";
    const runtime = movie.runtime ? `${movie.runtime} min` : "";
    const genres = movie.genres.map(g => g.name).join(" · ");
    const rating = movie.vote_average ? movie.vote_average.toFixed(1) : "—";
    
    // director
    const director = credits.crew?.find(person => person.job === "Director")?.name || "Not listed";
    // main cast (top 5)
    const cast = credits.cast?.slice(0, 6).map(c => c.name).join(", ") || "No data";

    const html = `
      <div class="details-grid">
        <div class="poster-sm">
          <img src="${poster}" alt="${movie.title}">
        </div>
        <div class="info-panel">
          <h2>${movie.title}</h2>
          <div class="meta-row">
            <span>${year}</span>
            <span>${runtime}</span>
            <span class="rating-badge">⭐ ${rating}</span>
            <span>${genres}</span>
          </div>
          <div class="overview">${movie.overview || "No overview available."}</div>
          <div class="cast-crew">
            <div>
              <h4>DIRECTOR</h4>
              <p>${director}</p>
            </div>
            <div>
              <h4>STARRING</h4>
              <p>${cast}</p>
            </div>
          </div>
        </div>
      </div>
    `;
    detailsSection.innerHTML = html;
  }

  // render recommendations grid
  function renderRecommendations(recommendations) {
    if (!recommendations.length) {
      similarGrid.innerHTML = `<div style="padding:2rem; text-align:center;">No similar movies found</div>`;
      return;
    }
    const gridHtml = recommendations.map(movie => `
      <div class="similar-card" data-id="${movie.id}">
        <img src="${movie.poster_path ? TMDB_POSTER + movie.poster_path : 'https://via.placeholder.com/342x513?text=No+Image'}" alt="${movie.title}">
        <div class="title">${movie.title}</div>
      </div>
    `).join("");
    similarGrid.innerHTML = gridHtml;
    // add click event to each card
    document.querySelectorAll(".similar-card").forEach(card => {
      card.addEventListener("click", (e) => {
        const id = card.dataset.id;
        if (id) {
          window.history.pushState({}, "", `/watch/${id}`);
          loadContentById(id);
        }
      });
    });
  }

  // load player with current server and movie ID
  function loadPlayer() {
    if (!currentMovieId) return;
    const server = SERVER_REGISTRY.find(s => s.id === currentServerId);
    if (!server) return;
    const embedUrl = server.movie(currentMovieId);
    if (!embedUrl) {
      playerContainer.innerHTML = `<div class="loader"><span>⚠️ Server error: invalid URL</span></div>`;
      return;
    }
    const iframeHtml = `<iframe src="${embedUrl}" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
      allowfullscreen="true"
      referrerpolicy="strict-origin-when-cross-origin"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation-by-user-activation allow-presentation"
      style="width:100%; height:100%; border:none;">
    </iframe>`;
    playerContainer.innerHTML = iframeHtml;
    activeServerBadge.innerHTML = `Active: ${server.label}`;
    document.querySelectorAll(".server-btn").forEach(btn => {
      if (btn.dataset.id === currentServerId) btn.classList.add("active");
      else btn.classList.remove("active");
    });
  }

  // full page load: fetch movie data, update UI, load player, recommendations
  async function loadContentById(movieId) {
    if (isLoading) return;
    isLoading = true;
    currentMovieId = movieId;
    updateUrl();

    // show loading states
    movieTitleEl.innerText = "Loading...";
    categoryBadge.innerText = "MOVIE";
    detailsSection.innerHTML = `<div class="loader"><div class="spinner"></div><span>Loading movie details...</span></div>`;
    similarGrid.innerHTML = `<div class="loader"><div class="spinner"></div><span>Loading recommendations...</span></div>`;
    playerContainer.innerHTML = `<div class="loader"><div class="spinner"></div><span>Preparing stream...</span></div>`;

    try {
      const { movie, credits } = await fetchMovieDetails(movieId);
      movieDataCache = { movie, credits };
      // title row
      movieTitleEl.innerText = movie.title;
      categoryBadge.innerText = "MOVIE";
      // details
      renderDetails(movie, credits);
      // recommendations
      const recos = await fetchRecommendations(movieId);
      renderRecommendations(recos);
      // player (first server or current)
      loadPlayer();
    } catch (err) {
      console.error(err);
      detailsSection.innerHTML = `<div class="error-state"><span>❌ ${err.message}</span><button onclick="location.reload()" style="background:#e50914; border:none; padding:0.5rem 1rem; border-radius:30px; color:white; cursor:pointer;">Retry</button></div>`;
      similarGrid.innerHTML = `<div class="error-state">Could not load recommendations</div>`;
      playerContainer.innerHTML = `<div class="loader"><span>⚠️ Failed to load movie</span></div>`;
    } finally {
      isLoading = false;
    }
  }

  // change server (called from UI)
  function changeServer(serverId) {
    if (currentServerId === serverId) return;
    currentServerId = serverId;
    updateUrl();
    loadPlayer();
    // highlight active
    document.querySelectorAll(".server-btn").forEach(btn => {
      if (btn.dataset.id === serverId) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    activeServerBadge.innerText = `Active: ${SERVER_REGISTRY.find(s => s.id === serverId)?.label || serverId}`;
  }

  // build server buttons UI
  function buildServerButtons() {
    serverBtnsContainer.innerHTML = "";
    SERVER_REGISTRY.forEach(server => {
      const btn = document.createElement("button");
      btn.className = "server-btn";
      if (server.id === currentServerId) btn.classList.add("active");
      btn.textContent = server.label;
      btn.dataset.id = server.id;
      btn.addEventListener("click", () => changeServer(server.id));
      serverBtnsContainer.appendChild(btn);
    });
  }

  // init: get ID from URL, set default server (first), load everything
  async function init() {
    buildServerButtons();
    const id = getMovieIdFromUrl();
    if (id && !isNaN(parseInt(id))) {
      await loadContentById(id);
    } else {
      // fallback demo: Dune: Part Two (949229)
      await loadContentById("949229");
    }
  }

  // handle popstate (back/forward)
  window.addEventListener("popstate", () => {
    const newId = getMovieIdFromUrl();
    const urlServer = new URLSearchParams(window.location.search).get("server");
    if (newId && newId !== currentMovieId) {
      loadContentById(newId);
    } else if (urlServer && SERVER_REGISTRY.some(s => s.id === urlServer)) {
      currentServerId = urlServer;
      loadPlayer();
      buildServerButtons(); // re-highlight
    }
  });

  init();
</script>
</body>
</html>
